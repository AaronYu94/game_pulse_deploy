// ── Floating event overlays (3D sprites) ──────────────────────────────
const activeSprites = [];

function makeTextSprite(text, fontSize, fillColor, w = 512, h = 128) {
  const tc = document.createElement('canvas');
  tc.width = w; tc.height = h;
  const tctx = tc.getContext('2d');
  tctx.clearRect(0, 0, w, h);
  // Glow / shadow behind text
  tctx.shadowColor = fillColor;
  tctx.shadowBlur = 18;
  tctx.font = `900 ${fontSize}px Arial, sans-serif`;
  tctx.fillStyle = fillColor;
  tctx.textAlign = 'center';
  tctx.textBaseline = 'middle';
  tctx.fillText(text, w / 2, h / 2);
  // Second pass for crispness
  tctx.shadowBlur = 0;
  tctx.fillText(text, w / 2, h / 2);
  const tex = new THREE.CanvasTexture(tc);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  return new THREE.Sprite(mat);
}

function showScoringFlash(text, worldX, worldZ, colorHex) {
  const sprite = makeTextSprite(text, 80, colorHex);
  sprite.position.set(worldX, RIM_H + 4, worldZ);
  sprite.scale.set(8, 2, 1);
  scene.add(sprite);
  const startY = sprite.position.y;
  const t0 = performance.now();
  function anim(now) {
    const t = (now - t0) / 1800;
    if (t >= 1) { scene.remove(sprite); return; }
    sprite.position.y = startY + t * 6;
    sprite.material.opacity = t < 0.15 ? t / 0.15 : 1 - (t - 0.15) / 0.85;
    requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

function showCenterOverlay(text, colorHex = '#ffffff', duration = 2200) {
  const sprite = makeTextSprite(text, 72, colorHex, 640, 128);
  sprite.position.set(0, 10, 0);
  sprite.scale.set(16, 3.2, 1);
  sprite.material.opacity = 0;
  scene.add(sprite);
  const t0 = performance.now();
  function anim(now) {
    const elapsed = now - t0;
    if (elapsed > duration + 500) { scene.remove(sprite); return; }
    if (elapsed < 300) {
      sprite.material.opacity = elapsed / 300;             // fade in
    } else if (elapsed < duration) {
      sprite.material.opacity = 1;                          // hold
    } else {
      sprite.material.opacity = 1 - (elapsed - duration) / 500; // fade out
    }
    requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

// ── Shot ripple effect (expanding ring on floor) ──────────────────────
function showShotRipple(worldX, worldZ, colorNum, made) {
  const ringGeo = new THREE.RingGeometry(0.2, 0.55, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: colorNum, transparent: true, opacity: made ? 0.95 : 0.55,
    side: THREE.DoubleSide, depthWrite: false,
    blending: made ? THREE.AdditiveBlending : THREE.NormalBlending,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(worldX, 0.02, worldZ);
  scene.add(ring);

  const t0 = performance.now();
  const dur = made ? 1600 : 800;
  function anim(now) {
    const t = (now - t0) / dur;
    if (t >= 1) { scene.remove(ring); ring.geometry.dispose(); ringMat.dispose(); return; }
    const scale = 1 + t * (made ? 14 : 6);
    ring.scale.setScalar(scale);
    ringMat.opacity = (made ? 0.95 : 0.55) * (1 - t * t);
    requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

// ── 3D Impact Ripple (concentric torus rings expanding from basket) ───
// ── Digital Nova: shader-based particle burst (replaces torus rings) ────
function showDigitalNova(worldX, worldZ, colorNum, is3pt) {
  const COUNT = is3pt ? 800 : 550;
  const pos = new Float32Array(COUNT * 3);
  const vel = new Float32Array(COUNT * 3);
  const rnd = new Float32Array(COUNT);
  const sz  = new Float32Array(COUNT);

  for (let i = 0; i < COUNT; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = (Math.random() - 0.5) * Math.PI;
    const spd   = 0.03 + Math.random() * (is3pt ? 0.11 : 0.07);
    pos[i*3]   = worldX;
    pos[i*3+1] = RIM_H - 0.4 + Math.random() * 0.6;
    pos[i*3+2] = worldZ;
    vel[i*3]   = Math.cos(phi) * Math.cos(theta) * spd;
    vel[i*3+1] = Math.abs(Math.sin(phi)) * spd + 0.012;
    vel[i*3+2] = Math.cos(phi) * Math.sin(theta) * spd;
    rnd[i] = Math.random() * 6.2832;
    sz[i]  = 2.5 + Math.random() * (is3pt ? 7.5 : 5.5);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',  new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('aVelocity', new THREE.BufferAttribute(vel, 3));
  geo.setAttribute('aRand',     new THREE.BufferAttribute(rnd, 1));
  geo.setAttribute('aSz',       new THREE.BufferAttribute(sz,  1));

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:  { value: 0.0 },
      uColor: { value: new THREE.Color(colorNum) },
    },
    vertexShader: `
      attribute vec3  aVelocity;
      attribute float aRand;
      attribute float aSz;
      uniform   float uTime;
      void main() {
        vec3 p = position + aVelocity * uTime * 10.0;
        // per-particle sin/cos breathing — digital noise feel, diminishes as burst expands
        float breath = (1.0 - uTime) * 0.55;
        p.x += sin(uTime * 9.42  + aRand)        * breath;
        p.y += cos(uTime * 7.85  + aRand * 1.3)  * breath * 0.6;
        p.z += sin(uTime * 11.0  + aRand * 0.8)  * breath;
        // gravity sag
        p.y -= uTime * uTime * 2.2;
        float alive = max(0.0, 1.0 - uTime * 1.25);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = aSz * alive * (220.0 / -mv.z);
        gl_Position  = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3  uColor;
      void main() {
        vec2  uv   = gl_PointCoord - 0.5;
        float d    = length(uv);
        if (d > 0.5) discard;
        float core  = 1.0 - smoothstep(0.0,  0.18, d);
        float halo  = 1.0 - smoothstep(0.12, 0.50, d);
        float alpha = (core * 0.95 + halo * 0.45) * max(0.0, 1.0 - uTime * uTime * 1.25);
        // white-hot core cools to team color as burst ages
        vec3  col   = mix(uColor, vec3(1.0, 0.92, 0.85), core * max(0.0, 1.0 - uTime * 1.6));
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending,
  });

  const pts = new THREE.Points(geo, mat);
  scene.add(pts);

  const DURATION = is3pt ? 2800 : 2200;
  const t0 = performance.now();
  (function anim(now) {
    const t = (now - t0) / DURATION;
    if (t >= 1) { scene.remove(pts); geo.dispose(); mat.dispose(); return; }
    mat.uniforms.uTime.value = t;
    requestAnimationFrame(anim);
  })(performance.now());
}

// ── Player jersey badge system ────────────────────────────────────────
const playerMap   = {};   // displayName → { jersey, colorHex }
const activeBadges = [];  // active floating badge entries

function makeJerseyCanvas(playerName, jersey, colorHex, made) {
  const SIZE = 128;
  const cv = document.createElement('canvas');
  cv.width = SIZE; cv.height = SIZE;
  const c = cv.getContext('2d');
  const cx = SIZE / 2, cy = SIZE / 2, r = 50;

  // Background circle with radial gradient
  const g = c.createRadialGradient(cx - 10, cy - 10, 4, cx, cy, r);
  g.addColorStop(0, colorHex + '55');
  g.addColorStop(1, '#000000cc');
  c.beginPath(); c.arc(cx, cy, r, 0, Math.PI * 2);
  c.fillStyle = g; c.fill();

  // Border ring
  c.strokeStyle = colorHex + (made ? 'dd' : '55');
  c.lineWidth = made ? 3 : 1.5;
  c.stroke();

  // Jersey number
  const numStr = (jersey || '?').toString();
  const fs = numStr.length > 2 ? 34 : numStr.length > 1 ? 42 : 50;
  c.font = `900 ${fs}px "JetBrains Mono",monospace`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.shadowColor = colorHex; c.shadowBlur = made ? 16 : 6;
  c.fillStyle = made ? '#ffffff' : '#999999';
  c.fillText(numStr, cx, cy - 7);
  c.shadowBlur = 0;

  // Last name (small)
  const last = (playerName.split(' ').pop() || playerName).toUpperCase().slice(0, 7);
  c.font = `bold 13px "JetBrains Mono",monospace`;
  c.fillStyle = colorHex + (made ? 'ff' : '99');
  c.textBaseline = 'top';
  c.fillText(last, cx, cy + 20);

  return cv;
}

function showPlayerBadge(playerName, wx, wz, colorHex, jersey, made, scaleMul = 1.0, duration = 4800) {
  if (!playerName) return;
  const cv  = makeJerseyCanvas(playerName, jersey, colorHex, made);
  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false,
    blending: THREE.NormalBlending, opacity: 0,
  });
  const sprite = new THREE.Sprite(mat);
  const baseScale = made ? 4.2 : 3.2;
  sprite.scale.set(baseScale * scaleMul, baseScale * scaleMul, 1);
  sprite.position.set(wx, 1.6, wz);
  scene.add(sprite);
  activeBadges.push({ sprite, mat, tex, t0: performance.now(), duration, startY: 1.6 });
}

function updatePlayerBadges() {
  const now = performance.now();
  for (let i = activeBadges.length - 1; i >= 0; i--) {
    const b = activeBadges[i];
    const t = (now - b.t0) / b.duration;
    if (t >= 1) {
      scene.remove(b.sprite);
      b.mat.dispose(); b.tex.dispose();
      activeBadges.splice(i, 1);
      continue;
    }
    b.sprite.position.y = b.startY + t * 2.8;   // float upward
    // Quick appear → hold → slow fade
    let a;
    if      (t < 0.08) a = t / 0.08;
    else if (t < 0.68) a = 1.0;
    else               a = 1.0 - (t - 0.68) / 0.32;
    b.mat.opacity = Math.max(0, a) * 0.92;
  }
}

// ── Holographic typewriter popup ─────────────────────────────────────
function showHologramPopup(text, wx, wy, wz, colorHex) {
  const W2 = 512, H2 = 72;
  const tc = document.createElement('canvas');
  tc.width = W2; tc.height = H2;
  const tctx = tc.getContext('2d');
  const tex = new THREE.CanvasTexture(tc);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(14, 2, 1);
  sprite.position.set(wx, wy, wz);
  scene.add(sprite);

  let charIdx = 0;
  const CHAR_MS  = 48, HOLD_MS = 2200, FADE_MS = 700;
  const t0 = performance.now();

  function tick(now) {
    const elapsed = now - t0;
    charIdx = Math.min(text.length, Math.floor(elapsed / CHAR_MS));
    const shown = text.slice(0, charIdx) + (charIdx < text.length ? '▌' : '');

    tctx.clearRect(0, 0, W2, H2);
    tctx.font = '700 32px "JetBrains Mono","Courier New",monospace';
    tctx.textBaseline = 'middle'; tctx.textAlign = 'left';
    tctx.shadowColor = colorHex; tctx.shadowBlur = 14;
    tctx.fillStyle = colorHex;
    tctx.fillText(shown, 12, H2 / 2);
    tex.needsUpdate = true;

    const holdStart = text.length * CHAR_MS;
    const fadeStart = holdStart + HOLD_MS;
    const totalDur  = fadeStart + FADE_MS;
    if (elapsed > totalDur) { scene.remove(sprite); mat.dispose(); tex.dispose(); return; }
    mat.opacity = elapsed > fadeStart ? 1 - (elapsed - fadeStart) / FADE_MS : 1;
    sprite.position.y += 0.006;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ── Player name extraction ────────────────────────────────────────────
function extractPlayerName(text) {
  if (!text) return '';
  // Strip ESPN timestamps like "(10:22)" and leading/trailing whitespace
  const clean = text.replace(/\(\d+:\d+\)/g, '').replace(/\s+/g, ' ').trim();
  // Match 2-4 consecutive capitalised words at start of string
  // Allows apostrophes, dots, hyphens (O'Neal, Jr., Al-Farouq)
  const m = clean.match(/^((?:[A-Z][a-zA-Z'\.\-]+)(?:\s+[A-Z][a-zA-Z'\.\-]+){1,3})/);
  return m ? m[1].toUpperCase() : '';
}

// ── Momentum streak tracker ───────────────────────────────────────────
let momStreak = { teamId: null, count: 0 };
function updateMomentumStreak(play) {
  if (!play?.scoringPlay) return;
  const tid = String(play.team?.id || '');
  if (tid && tid === momStreak.teamId) {
    momStreak.count = Math.min(momStreak.count + 1, 8);
  } else {
    momStreak = { teamId: tid, count: 1 };
  }
  const boost = Math.min(0.15 + momStreak.count * 0.1, 1.0);
  crowdUniforms.uMomentum.value = Math.max(crowdUniforms.uMomentum.value, boost);
  if (momStreak.count >= 3) {
    const isHome = tid === String(homeTeamId);
    const col = isHome ? homeColor : awayColor;
    ambLight.color.lerp(new THREE.Color(col), 0.12 * (momStreak.count / 8));
    ambLight.intensity = Math.min(ambLight.intensity + 0.15, 4.0);
  }
}

// ── Event detection from ESPN play text ───────────────────────────────
function detectEvent(play) {
  const txt = (play.text || '').toLowerCase();
  const teamColor = String(play.team?.id) === String(homeTeamId) ? homeColorHex : awayColorHex;

  // Scoring events
  if (play.scoringPlay && play.shootingPlay) {
    const is3 = txt.includes('three point') || txt.includes('3-pointer') || txt.includes('3pt');
    const side = attackingSide(play.team?.id, play.period?.number);
    const bx = basketWorldX(side);
    if (is3) {
      showScoringFlash('3PT!', bx, 0, teamColor);
    } else {
      showScoringFlash('+2', bx, 0, teamColor);
    }
    // Basket score reaction: gold burst + net swing + shake + crowd glow sweep
    triggerBasketScore(side);
    triggerCrowdReaction(side, hexToNum(teamColor));
    showDigitalNova(bx, 0, 0xff0000, is3);  // locked red
    triggerCameraShake(is3 ? 0.18 : 0.1);
    if (window._ambScorePulse) window._ambScorePulse(teamColor, is3 ? 5.5 : 4.0);
    if (window._ledOverload) window._ledOverload();  // Feature 4: ribbon burst
    exitFTZoom();                                     // Feature 3: exit FT zoom on score

    // ── LED flash + hologram popup ────────────────────────────────────
    updateMomentumStreak(play);
    const pName = extractPlayerName(play.text || '');
    const pts   = is3 ? '3PT' : '2PT';
    if (window._ledFlash) {
      const ledLabel = pName ? `${pName}  ${pts}!` : `${pts}!`;
      window._ledFlash(ledLabel, teamColor, 7000);
    }
    if (pName && play.coordinate && play.coordinate.x >= 0) {
      const popSide = attackingSide(play.team?.id, play.period?.number);
      const { x: px, z: pz } = espnToWorld(play.coordinate.x, play.coordinate.y, popSide);
      showHologramPopup(`${pName}  ${pts}!`, px, RIM_H + 2.5, pz, teamColor);
    }
  }

  // Shooting play: holo identity + jersey badge (no more shot ripple circle)
  if (play.shootingPlay && play.coordinate && play.coordinate.x >= 0 && play.coordinate.y >= 0) {
    const side   = attackingSide(play.team?.id, play.period?.number);
    const { x: wx, z: wz } = espnToWorld(play.coordinate.x, play.coordinate.y, side);
    const isHome = String(play.team?.id) === String(homeTeamId);
    const col    = isHome ? homeColorHex : awayColorHex;
    exitFTZoom();                                      // Feature 3: exit FT zoom on shot
    // Feature 1: holographic shooter identity
    const shooter = extractPlayerName(play.text || '');
    showHoloIdentity(shooter, wx, wz, isHome);
    // Jersey badge floats at shot coordinate
    const info = playerMap[shooter] || {};
    showPlayerBadge(shooter, wx, wz, info.colorHex || col, info.jersey, !!play.scoringPlay);
  }

  // Non-shooting plays: fade holo + participant badge
  if (!play.shootingPlay && play.team?.id) {
    clearHoloIdentity(false);                          // Feature 1: fade holo
    const pName = extractPlayerName(play.text || '');
    if (pName) {
      const side = attackingSide(play.team?.id, play.period?.number);
      const isHome = String(play.team?.id) === String(homeTeamId);
      const col  = isHome ? homeColorHex : awayColorHex;
      const info = playerMap[pName] || {};
      const bx   = basketWorldX(side) * 0.55 + (Math.random() - 0.5) * 14;
      const bz   = (Math.random() - 0.5) * 18;
      showPlayerBadge(pName, bx, bz, info.colorHex || col, info.jersey, false, 0.7, 3200);
    }
  }

  // Free throws — Feature 3: zoom to FT line
  if (!play.shootingPlay && txt.includes('free throw')) {
    const side = attackingSide(play.team?.id, play.period?.number);
    if (!txt.includes('missed') && play.scoringPlay) {
      showScoringFlash('+1', basketWorldX(side), 0, teamColor);
      triggerCrowdReaction(side, hexToNum(teamColor));
      updateMomentumStreak(play);
      if (window._ledFlash) {
        const ftName = extractPlayerName(play.text || '');
        if (ftName) window._ledFlash(`${ftName}  +1`, teamColor, 4000);
      }
      exitFTZoom();
    } else {
      enterFTZoom(side);                               // zoom in for the attempt
    }
  }

  // Timeouts
  if (txt.includes('timeout')) {
    const who = txt.includes('full') ? '' : '';
    showCenterOverlay('TIMEOUT', '#ffcc00', 2500);
  }

  // Fouls
  if (txt.includes('foul') && !txt.includes('free throw')) {
    showCenterOverlay('FOUL', '#ff4444', 1500);
  }

  // End of quarter
  if (txt.includes('end of') || txt.includes('end period')) {
    const q = play.period?.number || '';
    showCenterOverlay(`END OF Q${q}`, '#ffffff', 3000);
  }

  // Jump ball / start
  if (txt.includes('jump ball') && play.period?.number === 1) {
    showCenterOverlay('TIP OFF', '#44aaff', 2000);
  }
}

// ── ESPN coords → world 3D ────────────────────────────────────────────
// ESPN: coordinate.x = 0–50 (court width), coordinate.y = 0–28+ (distance from basket, 0=rim)
// homeSide: 'right' (+X) or 'left' (-X)
function espnToWorld(cx, cy, side) {
  // cy = distance from rim toward center
  // cx = 0–50 → z in [-25, 25]
  const worldZ = (cx - 25);          // centered on court width
  const worldX = side === 'right'
    ? RIM_X - cy                     // starts near right basket, moves left
    : -RIM_X + cy;                   // starts near left basket, moves right
  return { x: worldX, z: worldZ };
}

function attackingSide(teamId, period) {
  const isHome = String(teamId) === String(homeTeamId);
  // Q1&Q2: home→right basket, away→left basket
  // Q3&Q4: sides switch
  if (period <= 2) return isHome ? 'right' : 'left';
  return isHome ? 'left' : 'right';
}

function basketWorldX(side) { return side === 'right' ? RIM_X : -RIM_X; }

// ── Animation ─────────────────────────────────────────────────────────
let animId = null;
const RELEASE_H = 8.0; // ft — typical player release point

// Gravity-eased t: ball accelerates down, decelerates up (realistic arc feel)
function gravityEase(t) {
  // Slow out of hand, fast at peak, slow into rim
  return t < 0.5
    ? 2 * t * t                   // ease in
    : -1 + (4 - 2 * t) * t;      // ease out
}

function animateBallArc(play, onDone) {
  if (!play?.shootingPlay || !play.coordinate ||
      play.coordinate.x < 0 || play.coordinate.y < 0) {
    if (onDone) onDone();
    return;
  }
  cancelAnimationFrame(animId);
  resetTrail();
  resetTrailParticles();

  const side = attackingSide(play.team?.id, play.period?.number);
  const { x: sx, z: sz } = espnToWorld(play.coordinate.x, play.coordinate.y, side);
  const sy = RELEASE_H;

  const ex = basketWorldX(side);
  const ez = 0;
  const ey = RIM_H;

  const dist = Math.max(5, play.coordinate.y);
  const arcBoost = dist < 8 ? 8 : dist < 16 ? 12 : dist < 22 ? 16 : 20;
  const peakY = Math.max(sy, ey) + arcBoost;

  const mx = (sx + ex) / 2;
  const mz = (sz + ez) / 2;

  const duration = 600 + dist * 25;
  const t0 = performance.now();
  ballMesh.visible = true;

  // Trail color matches team
  const isHome = String(play.team?.id) === String(homeTeamId);
  trailMat.color.set(isHome ? homeColor : awayColor);
  trailMat.opacity = 0.55;

  function frame(now) {
    const rawT = Math.min((now - t0) / duration, 1);
    const t = gravityEase(rawT);
    const u = 1 - t;

    const bx = u*u*sx + 2*u*t*mx + t*t*ex;
    const by = u*u*sy + 2*u*t*peakY + t*t*ey;
    const bz = u*u*sz + 2*u*t*mz + t*t*ez;

    ballMesh.position.set(bx, by, bz);
    const spinRate = 0.18 * (1 - rawT * 0.4);
    ballMesh.rotation.z += spinRate;
    ballMesh.rotation.x += spinRate * 0.6;

    // Trail: push line + data stream particles every frame
    if (trailIdx === 0 || trailIdx % 1 === 0) pushTrail(bx, by, bz);
    pushTrailParticle(bx, by, bz);

    // Trail fades as ball flies
    trailMat.opacity = 0.55 * (1 - rawT * 0.5);

    ballLight.position.set(bx, by, bz);
    ballLight.intensity = 2.5 * Math.sin(rawT * Math.PI);

    const fromFloor = by;
    const shadowOpacity = Math.max(0, 0.35 - fromFloor * 0.02);
    const shadowScale = Math.max(0.3, 1.4 - fromFloor * 0.06);
    ballShadow.position.set(bx, 0.03, bz);
    ballShadow.material.opacity = shadowOpacity;
    ballShadow.scale.setScalar(shadowScale);

    render();
    if (rawT < 1) {
      animId = requestAnimationFrame(frame);
    } else {
      // Trigger scoring flash / event overlay
      detectEvent(play);
      setTimeout(() => {
        ballMesh.visible = false;
        ballLight.intensity = 0;
        ballShadow.material.opacity = 0;
        // Trail stays visible — render loop fades it out gracefully
        render();
        if (onDone) onDone();
      }, play.scoringPlay ? 550 : 220);
    }
  }
  animId = requestAnimationFrame(frame);
}

// ── Score pulse light (transient ambient flash on scoring) ────────────
const _scorePulseLight = new THREE.PointLight(0xffffff, 0, 90);
_scorePulseLight.position.set(0, 28, 0);
scene.add(_scorePulseLight);
window._ambScorePulse = function(colorHex, intensity) {
  _scorePulseLight.color.set(colorHex || '#ff6644');
  _scorePulseLight.intensity = Math.max(_scorePulseLight.intensity, intensity || 4.5);
};

// ── Feature 1: Holographic Shooter Identity ──────────────────────────
let _activeHoloIdentity = null;

function playerAbbrev(name) {
  return (name || '').split(/\s+/)
    .filter(w => w.length > 0)
    .map(w => w[0].toUpperCase())
    .join('').slice(0, 3) || '?';
}

function makeHoloCanvas(abbrev, isHome) {
  const SZ = 192;
  const cv = document.createElement('canvas');
  cv.width = SZ; cv.height = SZ;
  const c = cv.getContext('2d');
  const clr = isHome ? '#00ffff' : '#ff3333';

  // Horizontal scan lines
  for (let sy = 0; sy < SZ; sy += 3) {
    c.globalAlpha = 0.07; c.fillStyle = clr;
    c.fillRect(6, sy, SZ - 12, 1);
  }
  c.globalAlpha = 1;

  // Outer glow border
  c.shadowColor = clr; c.shadowBlur = 18;
  c.strokeStyle = clr; c.lineWidth = 1.5;
  c.strokeRect(5, 5, SZ - 10, SZ - 10);

  // Corner brackets
  const cL = 18; c.lineWidth = 2.8;
  [[5,5,1,1],[SZ-5,5,-1,1],[5,SZ-5,1,-1],[SZ-5,SZ-5,-1,-1]].forEach(([x,y,dx,dy]) => {
    c.beginPath();
    c.moveTo(x + dx*cL, y); c.lineTo(x, y); c.lineTo(x, y + dy*cL);
    c.stroke();
  });

  // Player abbreviation (top half)
  const fs = abbrev.length > 2 ? 46 : abbrev.length > 1 ? 56 : 66;
  c.font = `900 ${fs}px "JetBrains Mono",monospace`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.shadowColor = clr; c.shadowBlur = 24;
  c.fillStyle = '#ffffff';
  c.fillText(abbrev, SZ/2, SZ * 0.36);

  // Inverted triangle (bottom)
  const tx = SZ/2, ty0 = SZ * 0.60, tw = 66, th = 46;
  c.beginPath();
  c.moveTo(tx - tw/2, ty0);
  c.lineTo(tx + tw/2, ty0);
  c.lineTo(tx, ty0 + th);
  c.closePath();
  c.shadowBlur = 14;
  c.fillStyle = clr + '44'; c.fill();
  c.strokeStyle = clr + 'bb'; c.lineWidth = 1.5; c.stroke();

  return cv;
}

function showHoloIdentity(playerName, wx, wz, isHome) {
  clearHoloIdentity(true);
  const cv  = makeHoloCanvas(playerAbbrev(playerName), isHome);
  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, opacity: 0,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(6, 6, 1);
  sprite.position.set(wx, 5.5, wz);
  scene.add(sprite);
  _activeHoloIdentity = { sprite, mat, tex, phase: 'in', t0: performance.now() };
}

function clearHoloIdentity(instant = false) {
  if (!_activeHoloIdentity) return;
  if (instant) {
    scene.remove(_activeHoloIdentity.sprite);
    _activeHoloIdentity.mat.dispose();
    _activeHoloIdentity.tex.dispose();
    _activeHoloIdentity = null;
  } else {
    _activeHoloIdentity.phase = 'fade';
    _activeHoloIdentity.fadeStart = performance.now();
  }
}

function updateHoloIdentity() {
  if (!_activeHoloIdentity) return;
  const h = _activeHoloIdentity, now = performance.now();
  if (h.phase === 'in') {
    h.mat.opacity = Math.min(0.88, (now - h.t0) / 300 * 0.88);
    if (ballMesh.visible) {
      h.sprite.position.x += (ballMesh.position.x - h.sprite.position.x) * 0.06;
      h.sprite.position.z += (ballMesh.position.z - h.sprite.position.z) * 0.06;
    }
  } else {
    const t = (now - h.fadeStart) / 1500;
    if (t >= 1) {
      scene.remove(h.sprite); h.mat.dispose(); h.tex.dispose();
      _activeHoloIdentity = null; return;
    }
    h.sprite.position.y += 0.025;
    h.mat.opacity = 0.88 * (1 - t * t);
  }
}

// ── Feature 3: Free-throw camera zoom ────────────────────────────────
const _camLookCur   = new THREE.Vector3(0, 0, -4);  // tracks current lookAt
const _camLookFT    = new THREE.Vector3();           // FT zoom look target
let   _ftZoomActive = false;
let   _ftExitTimer  = null;

function enterFTZoom(side) {
  if (freeMode) return;
  clearTimeout(_ftExitTimer);
  _ftZoomActive = true;
  const ftX = side === 'right' ? 34 : -34;
  _camLookFT.set(ftX, 4, 0);
  // Reuse the existing smoothCamTo infrastructure
  smoothCamTo({ pos: [ftX * 0.5, 20, 30], look: [ftX, 4, 0] });
  bloomPass.strength  = 1.1;
  bloomPass.threshold = 0.20;
  ambLight.intensity  = 0.9;
}

function exitFTZoom() {
  if (!_ftZoomActive) return;
  _ftZoomActive = false;
  // Return to whatever preset the user last selected
  smoothCamTo(camTarget);
  _ftExitTimer = setTimeout(() => {
    if (!_ftZoomActive) {
      bloomPass.strength  = clutchActive ? 0.75 : 0.35;
      bloomPass.threshold = clutchActive ? 0.30 : 0.45;
      ambLight.intensity  = 4.5;
    }
  }, 900);
}

function updateFTCamera() {
  // No-op: FT zoom now delegates entirely to smoothCamTo.
  // Kept so render-loop call sites don't need to change.
}

// ── Camera Shake (high-frequency micro-vibration on key moments) ──────
let camShakeAmp = 0;
const camShakeOffset = { x: 0, y: 0 };

function triggerCameraShake(intensity = 0.15) {
  camShakeAmp = Math.max(camShakeAmp, intensity);
}

function applyCameraShake() {
  // Undo previous offset first
  camera.position.x -= camShakeOffset.x;
  camera.position.y -= camShakeOffset.y;
  camShakeOffset.x = 0;
  camShakeOffset.y = 0;

  if (camShakeAmp > 0.002) {
    const t = performance.now() * 0.001;
    camShakeOffset.x = Math.sin(t * 47 + 1.3) * camShakeAmp;
    camShakeOffset.y = Math.cos(t * 63) * camShakeAmp * 0.6;
    camera.position.x += camShakeOffset.x;
    camera.position.y += camShakeOffset.y;
    camShakeAmp *= 0.90; // fast decay
  }
}

// ── Continuous render loop (with crowd atmosphere) ────────────────────
let renderLoopActive = false;
let lastLoopTime = 0;
function startRenderLoop() {
  if (renderLoopActive) return;
  renderLoopActive = true;
  lastLoopTime = performance.now();
  function loop(now) {
    if (!renderLoopActive) return;
    const dt = (now - lastLoopTime) / 1000;
    lastLoopTime = now;
    updateCrowd(dt);
    updateBaskets(now / 1000);
    updatePlayerBadges();
    chevUniforms.uTime.value += dt;

    // Trail fade when not animating ball
    if (!ballMesh.visible && trailIdx > 0) {
      trailMat.opacity -= dt * 0.8;
      if (trailMat.opacity <= 0) resetTrail();
    }

    // Data stream particle fade
    updateTrailParticles(dt);

    // LED ribbon scroll + glitch
    if (window._updateLEDRibbons) window._updateLEDRibbons(now, dt);

    // Score pulse light decay
    if (_scorePulseLight.intensity > 0.05) _scorePulseLight.intensity *= 0.86;
    else _scorePulseLight.intensity = 0;

    updateHoloIdentity();
    updateFTCamera();
    _possArrow.update(dt);

    // Camera micro-shake (skip in free mode — conflicts with OrbitControls)
    if (!freeMode) applyCameraShake();

    // OrbitControls damping update
    if (freeMode) orbitControls.update();

    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}
function stopRenderLoop() { renderLoopActive = false; }

startRenderLoop();

// ── Data & state ──────────────────────────────────────────────────────
let plays      = [];
let homeTeamId = null;
let homeAbbr   = 'HOME', awayAbbr = 'AWAY';
let homeColor  = 0xc8102e, awayColor = 0x1d428a;
let homeColorHex = '#c8102e', awayColorHex = '#1d428a';

let playhead = 0;
let isPlaying = false;
let speed = 4;
let tickId = null;

const TEAM_COLORS_HEX = {
  NYK:'#006BB6', DET:'#C8102E', BOS:'#007A33', MIA:'#98002E',
  LAL:'#552583', GSW:'#1D428A', CHI:'#CE1141', BKN:'#111111',
  MIL:'#00471B', PHX:'#1D1160', DAL:'#00538C', DEN:'#0E2240',
  MIN:'#0C2340', OKC:'#007AC1', SAC:'#5A2D81', POR:'#E03A3E',
  UTA:'#002B5C', MEM:'#12173F', NOP:'#0C2340', HOU:'#CE1141',
  SAS:'#888888', CLE:'#860038', IND:'#002D62', CHA:'#1D1160',
  ORL:'#0077C0', WAS:'#002B5C', ATL:'#C8102E', PHI:'#006BB6',
  TOR:'#CE1141', LAC:'#C8102E',
};
function hexToNum(hex) { return parseInt(hex.replace('#',''), 16); }
function tColorHex(abbr) { return TEAM_COLORS_HEX[abbr] || '#888'; }

function buildShots(upTo) {
  clearShots();
  let count = 0;
  for (let i = 0; i <= upTo; i++) {
    const p = plays[i];
    if (!p?.shootingPlay || !p.coordinate || p.coordinate.x < 0 ||
        p.coordinate.y < 0 || p.coordinate.y > 35) continue;
    const side = attackingSide(p.team?.id, p.period?.number);
    const { x: wx, z: wz } = espnToWorld(p.coordinate.x, p.coordinate.y, side);
    const alpha = 0.40 + (count / Math.max(upTo, 1)) * 0.55;
    const isHomeTeam = String(p.team?.id) === String(homeTeamId);
    const col = hexToNum(isHomeTeam ? homeColorHex : awayColorHex);
    addShotDot(wx, wz, p.scoringPlay, col, alpha);
    count++;
  }
}

function formatWallclock(wc) {
  if (!wc) return '';
  try {
    return new Date(wc).toLocaleTimeString('en-US', {
      hour: 'numeric', minute: '2-digit', second: '2-digit',
      timeZone: 'America/New_York', timeZoneName: 'short',
    });
  } catch { return ''; }
}

// Quarter score tracking: find the last play of each quarter up to current playhead
function computeQtrScores(h) {
  const qtrs = {};   // { qNum: { home, away } }
  let prevHome = 0, prevAway = 0;
  for (let i = 0; i <= h; i++) {
    const p = plays[i]; if (!p) continue;
    const q = p.period?.number;
    if (!q) continue;
    const curHome = Number(p.homeScore) || 0;
    const curAway = Number(p.awayScore) || 0;
    if (!qtrs[q]) {
      // First play of this quarter: the scores accumulated up to here are from previous quarters
      qtrs[q] = { homeStart: prevHome, awayStart: prevAway, home: 0, away: 0 };
    }
    qtrs[q].home = curHome - qtrs[q].homeStart;
    qtrs[q].away = curAway - qtrs[q].awayStart;
    prevHome = curHome;
    prevAway = curAway;
  }
  return qtrs;
}

function updateUI(h) {
  const p = plays[h]; if (!p) return;
  document.getElementById('awayScore').textContent = p.awayScore ?? 0;
  document.getElementById('homeScore').textContent = p.homeScore ?? 0;
  document.getElementById('qtrLabel').textContent  = `Q${p.period?.number ?? 1}`;
  document.getElementById('clkLabel').textContent  = p.clock?.displayValue ?? '';

  // ── Chronos + Clutch mode ─────────────────────────────────────────
  const clkStr  = p.clock?.displayValue || '';
  const clkSec  = parseClockSec(clkStr);
  const diff    = Math.abs((p.homeScore || 0) - (p.awayScore || 0));
  const qNum    = p.period?.number || 1;
  const isClutch = diff <= 5 && clkSec <= 120 && qNum >= 4;
  setClutchMode(isClutch);
  updateChronos(clkStr, isClutch || clkSec <= 24);

  // Quarter scores bar
  const qtrs = computeQtrScores(h);
  const qEl = document.getElementById('qtrScores');
  const curQ = p.period?.number || 1;
  let qHTML = `<span style="color:#555;min-width:30px">${awayAbbr}</span>`;
  for (let q = 1; q <= Math.max(4, curQ); q++) {
    const d = qtrs[q];
    const isCur = q === curQ;
    const awayPts = d ? d.away : '—';
    const homePts = d ? d.home : '—';
    qHTML += `<span style="color:${isCur ? '#888' : '#333'};min-width:22px;text-align:center">
      <span style="display:block;font-size:8px;color:#333">Q${q}</span>
      <span style="color:${isCur ? awayColorHex : '#444'}">${awayPts}</span>-<span style="color:${isCur ? homeColorHex : '#444'}">${homePts}</span>
    </span>`;
  }
  qHTML += `<span style="color:#555;min-width:30px;text-align:right">${homeAbbr}</span>`;
  qEl.innerHTML = qHTML;

  // Scrubber
  const pct = plays.length > 1 ? h / (plays.length - 1) : 0;
  document.getElementById('scrubber').value = h;
  document.getElementById('fill').style.width = (pct * 100) + '%';
  document.getElementById('count').textContent = `${h + 1} / ${plays.length}`;

  // Event timeline
  buildTimeline(h);
}

function renderFrame() {
  const h = Math.min(playhead, plays.length - 1);
  buildShots(h);
  updateUI(h);
  updatePossession(plays[h]);
  render();
}

// ── Playback ──────────────────────────────────────────────────────────
function step() {
  if (playhead >= plays.length - 1) { stopPlay(); return; }
  playhead++;
  const p = plays[playhead];
  updateUI(playhead);
  updatePossession(p);

  if (p?.shootingPlay) {
    animateBallArc(p, () => {
      buildShots(playhead);
      render();
    });
  } else {
    detectEvent(p);
    buildShots(playhead);
    render();
  }
}

// Compute real-time delay between two consecutive plays based on wallclock
function playDelay(curr, next) {
  if (curr?.wallclock && next?.wallclock) {
    const delta = new Date(next.wallclock) - new Date(curr.wallclock);
    if (delta > 0 && delta < 600000) { // sanity: positive, < 10 min
      return Math.max(150, Math.min(delta / speed, 5000));
    }
  }
  return 1200 / speed; // fallback fixed interval
}

function scheduleStep() {
  if (!isPlaying || playhead >= plays.length - 1) { stopPlay(); return; }
  const curr = plays[playhead];
  const next = plays[playhead + 1];
  tickId = setTimeout(() => {
    if (!isPlaying) return;
    step();
    scheduleStep();
  }, playDelay(curr, next));
}

function startPlay() {
  isPlaying = true;
  document.getElementById('btnPlay').textContent = '⏸ Pause';
  document.getElementById('btnPlay').classList.add('playing');
  scheduleStep();
}
function stopPlay() {
  isPlaying = false;
  clearTimeout(tickId);
  document.getElementById('btnPlay').textContent = '▶ Play';
  document.getElementById('btnPlay').classList.remove('playing');
}
function setSpeed(s) {
  speed = s;
  document.querySelectorAll('[data-speed]').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.speed) === s);
  });
  if (isPlaying) { stopPlay(); startPlay(); }
}

document.getElementById('btnPlay').onclick    = () => isPlaying ? stopPlay() : startPlay();
document.getElementById('btnRestart').onclick = () => { stopPlay(); playhead = 0; ballMesh.visible = false; renderFrame(); };
document.getElementById('btnEnd').onclick     = () => { stopPlay(); playhead = plays.length - 1; ballMesh.visible = false; renderFrame(); };
document.getElementById('scrubber').oninput   = e => { stopPlay(); ballMesh.visible = false; playhead = +e.target.value; renderFrame(); };
document.querySelectorAll('[data-speed]').forEach(b => b.onclick = () => setSpeed(+b.dataset.speed));

// ── Camera presets (smooth transition) ────────────────────────────────
const CAM_PRESETS = {
  tv:   { pos: [0, 52, 72],  look: [0, 0, -4]  },
  top:  { pos: [0, 72, 8],   look: [0, 0, 0]   },
  base: { pos: [-62, 16, 6], look: [0, 8, 0]   },
};
let camTarget = CAM_PRESETS.tv;
let camAnimating = false;
let freeMode = false;

// ── OrbitControls for FREE camera ────────────────────────────────────
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.12;
orbitControls.minDistance = 5;
orbitControls.maxDistance = 200;
orbitControls.maxPolarAngle = Math.PI * 0.85;
orbitControls.target.set(0, 1, 0);
orbitControls.enabled = false;   // disabled until FREE mode

function enterFreeMode() {
  freeMode = true;
  orbitControls.target.set(0, 1, 0);
  orbitControls.enabled = true;
  orbitControls.update();
}

function exitFreeMode() {
  freeMode = false;
  orbitControls.enabled = false;
}

function smoothCamTo(preset) {
  camTarget = preset;
  if (camAnimating) return;
  camAnimating = true;
  const startPos = camera.position.clone();
  const endPos = new THREE.Vector3(...preset.pos);
  const endLook = new THREE.Vector3(...preset.look);
  const t0 = performance.now();
  const dur = 800;
  function anim(now) {
    const t = Math.min((now - t0) / dur, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    camera.position.lerpVectors(startPos, endPos, ease);
    camera.lookAt(endLook);
    if (t < 1) {
      requestAnimationFrame(anim);
    } else {
      camAnimating = false;
    }
  }
  requestAnimationFrame(anim);
}

document.querySelectorAll('.cam-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.cam-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const mode = b.dataset.cam;
    if (mode === 'free') {
      enterFreeMode();
    } else {
      exitFreeMode();
      smoothCamTo(CAM_PRESETS[mode]);
    }
  };
});

// ── Horizontal play-by-play strip ─────────────────────────────────────
const MAX_TL_ITEMS = 6;
const tlList = document.getElementById('tlList');
let lastTlHead = -1;  // track what we last built to avoid full rebuild

function getPlayTag(play) {
  const txt = (play.text || '').toLowerCase();
  if (play.scoringPlay) return ['PTS', '#4f8'];
  if (txt.includes('block')) return ['BLK', '#f55'];
  if (txt.includes('steal')) return ['STL', '#f80'];
  if (txt.includes('turnover')) return ['TO',  '#f55'];
  if (txt.includes('timeout')) return ['T/O', '#cc0'];
  if (txt.includes('foul')) return ['FUL', '#f44'];
  if (txt.includes('rebound')) return ['REB', '#5af'];
  if (txt.includes('substitution') || txt.includes('enters')) return ['SUB', '#556'];
  if (play.shootingPlay) return ['SHT', '#aaa'];
  return ['', '#445'];
}

function makeTlItem(p, i, isActive) {
  const isHome = String(p.team?.id) === String(homeTeamId);
  const teamCol = isHome ? homeColorHex : awayColorHex;
  const div = document.createElement('div');
  div.className = 'tl-item' + (p.scoringPlay ? ' scoring-play' : '') + (isActive ? ' active' : '');
  div.style.setProperty('--team-color', teamCol);
  div.dataset.idx = i;
  const [tag, tagCol] = getPlayTag(p);
  const shortText = (p.text || '—').slice(0, 80);
  const gameTime = `Q${p.period?.number || '?'} ${p.clock?.displayValue || ''}`;
  div.innerHTML = `<span class="tl-clock">${gameTime}</span>${tag ? `<span class="tl-tag" style="color:${tagCol}">${tag}</span>` : '<span class="tl-tag"></span>'}<span class="tl-text">${shortText}</span>`;
  div.onclick = () => {
    stopPlay(); ballMesh.visible = false;
    playhead = i; renderFrame();
  };
  return div;
}

function buildTimeline(upToHead) {
  // Full rebuild only if jumping backwards or far ahead
  if (upToHead < lastTlHead || upToHead - lastTlHead > 5) {
    const startIdx = Math.max(0, upToHead - MAX_TL_ITEMS + 1);
    tlList.innerHTML = '';
    for (let i = startIdx; i <= upToHead; i++) {
      const p = plays[i]; if (!p) continue;
      tlList.appendChild(makeTlItem(p, i, i === upToHead));
    }
  } else if (upToHead > lastTlHead) {
    // Incremental: add only new plays
    // Remove 'active' from old active
    const oldActive = tlList.querySelector('.tl-item.active');
    if (oldActive) oldActive.classList.remove('active');
    for (let i = lastTlHead + 1; i <= upToHead; i++) {
      const p = plays[i]; if (!p) continue;
      tlList.appendChild(makeTlItem(p, i, i === upToHead));
    }
    // Trim old entries
    while (tlList.children.length > MAX_TL_ITEMS) tlList.removeChild(tlList.firstChild);
  }
  lastTlHead = upToHead;
}


// ── Live mode ─────────────────────────────────────────────────────────
let liveMode      = false;
let livePollTimer = null;
let lastSeqNum    = -1;   // highest sequenceNumber seen so far
let liveAnimQueue = [];   // plays waiting to be animated
let liveAnimBusy  = false;

function liveEnqueue(play) {
  liveAnimQueue.push(play);
  if (!liveAnimBusy) liveDequeue();
}

function liveDequeue() {
  if (liveAnimQueue.length === 0) { liveAnimBusy = false; return; }
  liveAnimBusy = true;
  const play = liveAnimQueue.shift();
  plays.push(play);
  playhead = plays.length - 1;
  document.getElementById('scrubber').max = Math.max(0, plays.length - 1);
  updateUI(playhead);
  if (play.shootingPlay) {
    animateBallArc(play, () => {
      buildShots(playhead);
      render();
      setTimeout(liveDequeue, 300);
    });
  } else {
    buildShots(playhead);
    render();
    setTimeout(liveDequeue, 80);
  }
}

async function pollLive() {
  try {
    const res  = await fetch(ESPN_API + '&_=' + Date.now()); // bust cache
    const json = await res.json();

    // Update score/status from header (independent of plays)
    const comp = json.header?.competitions?.[0] || {};
    const st   = comp.status?.type;
    const el   = document.getElementById('statusLabel');
    if (st?.state === 'in') {
      el.innerHTML = '<span class="live-dot"></span>LIVE';
      el.className = 'hb-status live';
    } else if (st?.completed) {
      el.textContent = 'FINAL'; el.className = 'hb-status replay';
      // Game over — stop polling
      stopLive();
    }

    const freshPlays = (json.plays || [])
      .filter(p => p.period?.number)
      .filter(p => {
        const seq = parseInt(p.sequenceNumber, 10) || 0;
        return seq > lastSeqNum;
      })
      .sort((a, b) => (parseInt(a.sequenceNumber,10)||0) - (parseInt(b.sequenceNumber,10)||0));

    freshPlays.forEach(p => {
      lastSeqNum = Math.max(lastSeqNum, parseInt(p.sequenceNumber, 10) || 0);
      liveEnqueue(p);
    });
  } catch (e) {
    console.warn('Live poll error:', e);
  }
}

function startLive() {
  liveMode = true;
  const btn = document.getElementById('btnLive');
  btn.textContent = '⬤ LIVE ON';
  btn.style.background = '#f04';
  btn.style.color = '#fff';
  btn.style.borderColor = '#f04';
  stopPlay(); // stop replay mode

  // Set lastSeqNum to current plays so we only get NEW plays
  lastSeqNum = plays.reduce((max, p) => {
    const seq = parseInt(p.sequenceNumber, 10) || 0;
    return Math.max(max, seq);
  }, -1);

  pollLive(); // immediate poll
  livePollTimer = setInterval(pollLive, 8000);
}

function stopLive() {
  liveMode = false;
  clearInterval(livePollTimer);
  const btn = document.getElementById('btnLive');
  btn.textContent = '⬤ LIVE';
  btn.style.background = '';
  btn.style.color = '#f04';
  btn.style.borderColor = '#f04';
}

document.getElementById('btnLive').onclick = () => liveMode ? stopLive() : startLive();

document.getElementById('btnShots').onclick = function() {
  shotGroup.visible = !shotGroup.visible;
  this.classList.toggle('active', shotGroup.visible);
  render();
};

// ── Load game data ────────────────────────────────────────────────────
function loadRosterMap(json) {
  // boxscore.players is the most reliable source in game summary JSON
  const bsPlayers = json.boxscore?.players || [];
  for (const teamData of bsPlayers) {
    const isHome  = String(teamData.team?.id) === String(homeTeamId);
    const colorHex = isHome ? homeColorHex : awayColorHex;
    for (const stat of (teamData.statistics || [])) {
      for (const entry of (stat.athletes || [])) {
        const ath = entry.athlete;
        if (!ath?.displayName) continue;
        const info = { jersey: ath.jersey || '', colorHex };
        playerMap[ath.displayName] = info;
        playerMap[ath.displayName.toUpperCase()] = info;  // match extractPlayerName output
        // Also index by last name as fallback
        const last = ath.displayName.split(' ').pop();
        if (last && !playerMap[last]) playerMap[last] = info;
        if (last && !playerMap[last.toUpperCase()]) playerMap[last.toUpperCase()] = info;
      }
    }
  }
  // rosters field (present in some events)
  for (const tr of (json.rosters || [])) {
    const isHome  = String(tr.team?.id) === String(homeTeamId);
    const colorHex = isHome ? homeColorHex : awayColorHex;
    for (const entry of (tr.roster || [])) {
      const ath = entry.athlete;
      if (!ath?.displayName || playerMap[ath.displayName]) continue;
      playerMap[ath.displayName] = { jersey: ath.jersey || '', colorHex };
    }
  }
}

async function loadGame() {
  document.getElementById('tlList').innerHTML = '<div class="tl-item active">Loading game…</div>';
  try {
    const res  = await fetch(ESPN_API);
    const json = await res.json();

    const comps    = json.header?.competitions?.[0]?.competitors || [];
    const homeComp = comps.find(c => c.homeAway === 'home') || {};
    const awayComp = comps.find(c => c.homeAway === 'away') || {};
    homeTeamId    = homeComp.team?.id;
    homeAbbr      = homeComp.team?.abbreviation || 'HOME';
    awayAbbr      = awayComp.team?.abbreviation || 'AWAY';
    homeColorHex  = tColorHex(homeAbbr);
    awayColorHex  = tColorHex(awayAbbr);
    homeColor     = hexToNum(homeColorHex);
    awayColor     = hexToNum(awayColorHex);

    // Build player → jersey map from boxscore/roster data
    loadRosterMap(json);

    // Paint colors on court
    addPaintColor(-47 + 9.5, awayColor);
    addPaintColor( 47 - 9.5, homeColor);

    // Update crowd particle team colors
    crowdUniforms.uHomeColor.value.set(homeColor);
    crowdUniforms.uAwayColor.value.set(awayColor);

    document.getElementById('homeAbbr').textContent = homeAbbr;
    document.getElementById('awayAbbr').textContent = awayAbbr;
    document.getElementById('homeTeam').style.setProperty('--c', homeColorHex);
    document.getElementById('awayTeam').style.setProperty('--c', awayColorHex);

    const st = json.header?.competitions?.[0]?.status?.type;
    const el = document.getElementById('statusLabel');
    if (st?.state === 'in') {
      el.innerHTML = '<span class="live-dot"></span>LIVE';
      el.className = 'hb-status live';
    } else {
      el.textContent = st?.completed ? 'FINAL' : 'REPLAY';
      el.className = 'hb-status replay';
    }

    plays    = (json.plays || [])
      .filter(p => p.period?.number)
      .sort((a, b) => (parseInt(a.sequenceNumber,10)||0) - (parseInt(b.sequenceNumber,10)||0));
    playhead = plays.length - 1;
    document.getElementById('scrubber').max = Math.max(0, plays.length - 1);

    // Quarter dividers on scrubber
    const qDivs = document.getElementById('qDivs');
    qDivs.innerHTML = '';
    [2,3,4].forEach(q => {
      const idx = plays.findIndex(p => p.period?.number === q);
      if (idx > 0) {
        const d = document.createElement('div');
        d.className = 'q-div';
        d.style.left = (idx / (plays.length - 1) * 100) + '%';
        qDivs.appendChild(d);
      }
    });

    document.getElementById('legend').innerHTML = '';

    renderFrame();
  } catch(e) {
    document.getElementById('tlList').innerHTML = '<div class="tl-item active" style="color:#f44">Failed to load. Check console.</div>';
    console.error(e);
  }
}

// Dynamic paint color update
function addPaintColor(x, colorNum) {
  // Remove old dynamic paints first
  const pg = new THREE.PlaneGeometry(19, 16);
  const pm = new THREE.MeshBasicMaterial({ color: colorNum, transparent: true, opacity: 0.22, depthWrite: false });
  const p = new THREE.Mesh(pg, pm);
  p.rotation.x = -Math.PI / 2;
  p.position.set(x, 0.008, 0);
  scene.add(p);
}

// Initial render
render();
loadGame();
