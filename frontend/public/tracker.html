<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Game Tracker Prototype — 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --glass: rgba(10,10,10,0.75);
    --glass-border: rgba(255,255,255,0.07);
    --glass-blur: 18px;
    --accent: #dd2233;
    --surface: rgba(12,12,12,0.90);
    --font-score: 'Orbitron', monospace;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    --font-ui: 'JetBrains Mono', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
  }
  body {
    background: #000;
    font-family: var(--font-ui);
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 16px;
  }
  .tracker { width: 100%; max-width: 960px; }

  /* ── Glassmorphism scorebar ─────────────────────────── */
  /* ── Compact header bar ───────────────────────────── */
  .header-bar {
    display: flex; align-items: center;
    background: var(--glass); backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border); border-bottom: none;
    border-radius: 12px 12px 0 0; padding: 6px 14px; gap: 8px; overflow: hidden;
  }
  .hb-team { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .hb-team.away { border-right: 1px solid rgba(255,255,255,0.05); padding-right: 12px; }
  .hb-team.home { border-left: 1px solid rgba(255,255,255,0.05); padding-left: 12px; }
  .hb-abbr { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: #667; letter-spacing: 2px; }
  .hb-score { font-family: var(--font-score); font-size: 26px; font-weight: 900; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; }
  .hb-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .hb-status { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 2px; display: flex; align-items: center; gap: 4px; }
  .hb-status.live { color: #ff3355; }
  .hb-status.replay { color: #445; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #ff3355; box-shadow: 0 0 5px #ff3355; animation: blink 1.2s infinite; flex-shrink: 0; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
  .hb-qtr { font-family: var(--font-score); font-size: 13px; font-weight: 700; color: #aab; }
  .hb-clk { font-family: var(--font-mono); font-size: 11px; color: #445; }
  .hb-qtrs { display: flex; gap: 6px; align-items: center; font-family: var(--font-mono); font-size: 10px; color: #334; font-variant-numeric: tabular-nums; }

  /* ── Play-by-play strip (vertical list) ───────────── */
  .plays-strip {
    display: flex; flex-direction: column; justify-content: flex-end;
    background: rgba(5,5,5,0.97);
    border-left: 1px solid var(--glass-border);
    border-right: 1px solid var(--glass-border);
    height: 116px; overflow: hidden;
  }
  .tl-item {
    display: flex; align-items: baseline; gap: 7px; flex-shrink: 0;
    padding: 3px 14px; font-size: 10.5px; color: #383838;
    border-bottom: 1px solid rgba(255,255,255,0.025);
    line-height: 1.5; white-space: nowrap; overflow: hidden;
  }
  .tl-item:last-child { border-bottom: none; }
  .tl-item.active {
    color: #b0bcbc;
    background: rgba(255,255,255,0.03);
    border-left: 2px solid var(--team-color, #444);
    padding-left: 12px;
  }
  .tl-item.scoring-play.active { border-left-color: var(--team-color, var(--accent)); }
  .tl-clock {
    font-family: var(--font-mono); font-size: 9.5px;
    color: #484848; flex-shrink: 0; min-width: 62px; letter-spacing: 0.2px;
  }
  .tl-item.active .tl-clock { color: #5a7070; }
  .tl-tag {
    font-size: 9px; font-weight: 700; flex-shrink: 0;
    min-width: 26px; text-align: right; opacity: 0.85;
  }
  .tl-text { flex: 1; overflow: hidden; text-overflow: ellipsis; }

  /* ── Court (full width) ────────────────────────────── */
  .court-wrap {
    border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border);
    background: #000; line-height: 0; position: relative;
  }
  #threeCanvas { display: block; width: 100% !important; }

  /* ── Glassmorphism controls ────────────────────────── */
  .controls {
    background: var(--glass);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border); border-top: none;
    border-radius: 0 0 12px 12px; padding: 6px 14px 8px;
  }
  .q-labels { display: flex; margin-bottom: 3px; }
  .q-labels span { flex: 1; font-family: var(--font-mono); font-size: 9px; color: #2a2e2e; text-align: center; letter-spacing: 1px; }

  .scrubber-wrap { position: relative; margin-bottom: 8px; }
  .scrubber {
    width: 100%; appearance: none; height: 3px;
    background: rgba(20,22,22,0.8); border-radius: 2px; cursor: pointer; outline: none;
  }
  .scrubber::-webkit-slider-thumb {
    appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #ff6677, var(--accent));
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(200,20,40,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .scrubber::-webkit-slider-thumb:hover {
    transform: scale(1.25);
    box-shadow: 0 0 10px rgba(200,20,40,0.8), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .fill {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    height: 3px; background: linear-gradient(90deg, #991122, var(--accent));
    border-radius: 2px; pointer-events: none;
  }
  .q-divs { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
  .q-div { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.07); }

  .btn-row { display: flex; align-items: center; gap: 4px; }

  /* ── Metal buttons ── */
  .btn {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.4px;
    padding: 3px 8px; border-radius: 3px;
    cursor: pointer; white-space: nowrap;
    color: #7a8888;
    background: linear-gradient(180deg, #1c2020 0%, #0f1212 100%);
    border: 1px solid rgba(255,255,255,0.09);
    border-bottom-color: rgba(0,0,0,0.55);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      0 1px 3px rgba(0,0,0,0.55);
    transition: background .12s, color .12s, box-shadow .12s, transform .08s;
  }
  .btn:hover {
    background: linear-gradient(180deg, #252b2b 0%, #151919 100%);
    color: #b8c4c4;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      0 1px 4px rgba(0,0,0,0.65);
  }
  .btn:active {
    background: linear-gradient(180deg, #0c0f0f 0%, #131717 100%);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.6), 0 1px 1px rgba(0,0,0,0.3);
    transform: translateY(0.5px);
    color: #99a8a8;
  }
  .btn.active {
    background: linear-gradient(180deg, rgba(170,12,25,0.55) 0%, rgba(100,6,14,0.65) 100%);
    border-color: rgba(200,20,40,0.35);
    border-bottom-color: rgba(60,4,10,0.8);
    color: #ff5566;
    box-shadow:
      inset 0 1px 0 rgba(255,80,100,0.12),
      0 0 7px rgba(200,20,40,0.25),
      0 1px 3px rgba(0,0,0,0.6);
  }
  .btn.play-btn {
    font-size: 11px; font-weight: 700;
    padding: 3px 11px; color: #aababa;
    background: linear-gradient(180deg, #222828 0%, #131818 100%);
    border-color: rgba(255,255,255,0.13);
  }
  .btn.play-btn:hover { color: #e0ecec; }
  .btn.play-btn.playing {
    background: linear-gradient(180deg, rgba(170,12,25,0.55) 0%, rgba(100,6,14,0.65) 100%);
    border-color: rgba(200,20,40,0.4);
    color: #ff5566;
    box-shadow:
      inset 0 1px 0 rgba(255,80,100,0.12),
      0 0 7px rgba(200,20,40,0.25),
      0 1px 3px rgba(0,0,0,0.6);
  }
  .count { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: #2a3030; }
  .legend { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: #445; flex-wrap: wrap; align-items: center; }
  .ld { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle; }

/* ── Camera preset buttons ─────────────────────── */
  .cam-btn { letter-spacing: 1px; }
</style>
</head>
<body>
<div class="tracker">

  <!-- Compact header: scores + status + quarter breakdown -->
  <div class="header-bar">
    <div class="hb-team away" id="awayTeam" style="--c:#1d428a">
      <div class="hb-abbr" id="awayAbbr">AWAY</div>
      <div class="hb-score" id="awayScore">0</div>
    </div>
    <div class="hb-center">
      <div class="hb-status replay" id="statusLabel">REPLAY</div>
      <div class="hb-qtr" id="qtrLabel">Q1</div>
      <div class="hb-clk" id="clkLabel">12:00</div>
      <div class="hb-qtrs" id="qtrScores"></div>
    </div>
    <div class="hb-team home" id="homeTeam" style="--c:#c8102e">
      <div class="hb-score" id="homeScore">0</div>
      <div class="hb-abbr" id="homeAbbr">HOME</div>
    </div>
  </div>

  <!-- Horizontal play-by-play strip -->
  <div class="plays-strip" id="tlList"></div>

  <!-- Full-width court -->
  <div class="court-wrap"><canvas id="threeCanvas"></canvas></div>

  <div class="controls">
    <div class="q-labels"><span>Q1</span><span>Q2</span><span>Q3</span><span>Q4</span></div>
    <div class="scrubber-wrap">
      <div class="fill" id="fill"></div>
      <div class="q-divs" id="qDivs"></div>
<input type="range" class="scrubber" id="scrubber" min="0" max="100" value="0" />
    </div>
    <div class="btn-row">
      <button class="btn" id="btnRestart">⏮</button>
      <button class="btn play-btn" id="btnPlay">▶ Play</button>
      <button class="btn" id="btnEnd">⏭</button>
      <div style="margin-left:8px;display:flex;gap:3px">
        <button class="btn" data-speed="1">1×</button>
        <button class="btn active" data-speed="4">4×</button>
        <button class="btn" data-speed="12">12×</button>
      </div>
      <!-- Camera presets -->
      <div style="margin-left:8px;display:flex;gap:3px">
        <button class="btn cam-btn active" data-cam="tv">TV</button>
        <button class="btn cam-btn" data-cam="top">TOP</button>
        <button class="btn cam-btn" data-cam="base">BASE</button>
      </div>
      <button class="btn active" id="btnShots" style="margin-left:8px">SHOTS</button>
      <span class="count" id="count">0 / 0</span>
      <button class="btn" id="btnLive" style="margin-left:8px;border-color:rgba(255,50,80,0.4);color:#ff3355">⬤ LIVE</button>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader }      from 'three/addons/shaders/FXAAShader.js';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';

// ── Config ───────────────────────────────────────────────────────────
const GAME_ID = new URLSearchParams(window.location.search).get('gameId') || '401705733';
const ESPN_API = `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${GAME_ID}`;

// NBA court: 94ft long × 50ft wide. Units = feet.
// X: -47 (left baseline) → +47 (right baseline)
// Y: up
// Z: -25 (near sideline/camera) → +25 (far sideline)
const COURT_HALF_L = 47;   // ft half-length
const COURT_HALF_W = 25;   // ft half-width
const RIM_H = 10;          // ft
const RIM_X = COURT_HALF_L - 5.25;  // 41.75 ft from center
const RIM_R = 0.75;        // rim radius ft
const BALL_R = 0.39;       // ~9.4in radius

// ── Three.js setup ───────────────────────────────────────────────────
const canvas = document.getElementById('threeCanvas');
const W = 960, H = 440;
const DPR = Math.min(window.devicePixelRatio, 2);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(DPR);          // must be BEFORE setSize
renderer.setSize(W, H);              // applies DPR internally → actual buffer = W*DPR × H*DPR
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.55;  // brighter overall arena

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.004);

const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 500);
camera.position.set(0, 52, 72);
camera.lookAt(0, 0, -4);

// ── Post-processing: Bloom ───────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.setPixelRatio(DPR);
composer.setSize(W, H);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(W * DPR, H * DPR), 0.35, 0.5, 0.45);
composer.addPass(bloomPass);

// ── Feature 5: FXAA anti-alias pass ──────────────────────────────────
const fxaaPass = new ShaderPass(FXAAShader);
fxaaPass.uniforms['resolution'].value.set(1 / (W * DPR), 1 / (H * DPR));
composer.addPass(fxaaPass);

// Helper: use composer everywhere instead of renderer.render
function render() { composer.render(); }

// ── Lighting ─────────────────────────────────────────────────────────
// Arena overhead spotlights
const ambLight = new THREE.AmbientLight(0x445566, 4.5);  // brighter, less purple
scene.add(ambLight);

function addSpot(x, y, z, intensity, color = 0xfff8e8) {
  const spot = new THREE.SpotLight(color, intensity);
  spot.position.set(x, y, z);
  spot.target.position.set(x, 0, 0);
  spot.angle = Math.PI / 4.5;
  spot.penumbra = 0.35;
  spot.decay = 1.0;
  spot.distance = 100;
  spot.castShadow = true;
  spot.shadow.mapSize.set(512, 512);
  scene.add(spot);
  scene.add(spot.target);
}
addSpot(-35, 32, 5, 160);
addSpot(-12, 34, 5, 180);
addSpot( 12, 34, 5, 180);
addSpot( 35, 32, 5, 160);

// Side fill — scorer's table side
const fillLight = new THREE.DirectionalLight(0x8899bb, 6.0);  // stronger cool fill
fillLight.position.set(0, 20, 55);
scene.add(fillLight);

// ── Court floor ──────────────────────────────────────────────────────
function makeWoodTexture() {
  const size = 512;
  const tc = document.createElement('canvas');
  tc.width = tc.height = size;
  const tctx = tc.getContext('2d');

  // Pure black base
  tctx.fillStyle = '#000000';
  tctx.fillRect(0, 0, size, size);

  // Very faint board seams only — no grain, no sheen
  tctx.strokeStyle = 'rgba(255,255,255,0.025)';
  tctx.lineWidth = 1;
  for (let y = 36; y < size; y += 72) {
    tctx.beginPath(); tctx.moveTo(0, y); tctx.lineTo(size, y); tctx.stroke();
  }

  const tex = new THREE.CanvasTexture(tc);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(10, 1);
  return tex;
}

const woodTex = makeWoodTexture();
const floorGeo = new THREE.PlaneGeometry(COURT_HALF_L * 2, COURT_HALF_W * 2);
const floorMat = new THREE.MeshPhysicalMaterial({
  map: woodTex,
  color: 0x181818,             // slightly lighter base — reflects arena lights
  roughness: 0.85,             // matte — absorbs light
  metalness: 0.0,
  clearcoat: 0.25,             // subtle edge fresnel only
  clearcoatRoughness: 0.4,
  reflectivity: 0.15,
  envMapIntensity: 0.2,
  dithering: true,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Court edge frame — beveled matte body + piano-black top bevel + recessed emissive groove
{
  const cL = COURT_HALF_L * 2, cW = COURT_HALF_W * 2, eW = 0.6, eH = 0.32;
  const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0x060608, roughness: 0.85, metalness: 0.1 });
  const bevelMat = new THREE.MeshPhysicalMaterial({
    color: 0x0a0a12, roughness: 0.05, metalness: 0.3, clearcoat: 1.0, clearcoatRoughness: 0.02,
  });
  const grooveEdgeMat = new THREE.MeshStandardMaterial({
    color: 0x0a0000, emissive: 0xff1a00, emissiveIntensity: 0.8, side: THREE.DoubleSide,
    depthWrite: false,           // never let groove lose to a coplanar body top face
    polygonOffset: true,
    polygonOffsetFactor: -1,     // pull groove toward camera in depth space
    polygonOffsetUnits: -4,
  });
  // Outer body
  const body = new THREE.Mesh(new THREE.BoxGeometry(cL + eW * 2, eH, cW + eW * 2), bodyMat);
  body.position.y = -eH / 2; body.receiveShadow = true; scene.add(body);
  // Piano-black bevel top
  const bevel = new THREE.Mesh(new THREE.BoxGeometry(cL + eW * 2 - 0.04, 0.018, cW + eW * 2 - 0.04), bevelMat);
  bevel.position.y = -0.005; scene.add(bevel);
  // Recessed emissive grooves along inner boundary (light from cracks)
  for (const zs of [-1, 1]) {
    const g = new THREE.Mesh(new THREE.PlaneGeometry(cL, 0.1), grooveEdgeMat);
    g.rotation.x = -Math.PI / 2; g.position.set(0, 0.05, zs * (COURT_HALF_W + 0.08)); scene.add(g);
  }
  for (const xs of [-1, 1]) {
    const g = new THREE.Mesh(new THREE.PlaneGeometry(0.1, cW), grooveEdgeMat);
    g.rotation.x = -Math.PI / 2; g.position.set(xs * (COURT_HALF_L + 0.08), 0.05, 0); scene.add(g);
  }
}

// ── Court lines on floor ─────────────────────────────────────────────
function makeCourtLines() {
  const lc = document.createElement('canvas');
  lc.width = 940; lc.height = 500;
  const lctx = lc.getContext('2d');
  lctx.clearRect(0, 0, lc.width, lc.height);

  // Scale: 1ft = 10px
  const S = 10;
  const ox = 0, oy = 0;
  // Court center in canvas: (470, 250)
  const cx = 470, cy = 250;

  lctx.strokeStyle = 'rgba(255,255,255,0.85)';
  lctx.lineWidth = 2;

  function ft(x, z) { return [cx + x * S, cy + z * S]; }

  // Boundary — inset by 1px so the full 2px stroke isn't clipped at the canvas edge
  lctx.strokeRect(cx - 47*S + 1, cy - 25*S + 1, 94*S - 2, 50*S - 2);

  // Half court line
  lctx.beginPath();
  lctx.moveTo(...ft(0, -25)); lctx.lineTo(...ft(0, 25)); lctx.stroke();

  // Center circle (6ft radius)
  lctx.beginPath();
  lctx.arc(...ft(0, 0), 6*S, 0, Math.PI*2); lctx.stroke();

  // Left paint (key): 16ft wide (8 each side), 19ft long
  lctx.strokeRect(cx - 47*S, cy - 8*S, 19*S, 16*S);
  // Left FT circle
  lctx.beginPath();
  lctx.arc(...ft(-47+19, 0), 6*S, 0, Math.PI*2); lctx.stroke();

  // Right paint
  lctx.strokeRect(cx + 28*S, cy - 8*S, 19*S, 16*S);
  // Right FT circle
  lctx.beginPath();
  lctx.arc(...ft(47-19, 0), 6*S, 0, Math.PI*2); lctx.stroke();

  // 3pt arc geometry: radius 23.75ft from basket, corner line at z=±22
  // Arc meets corner line where: asin(22/23.75) ≈ 0.378π
  const arcHalf = Math.asin(22 / 23.75); // ≈ 1.187 rad ≈ 0.378π
  const cornerLen = 23.75 * Math.cos(arcHalf); // ≈ 8.97ft from basket → 14.25ft from baseline

  // Left 3pt arc (basket at -41.75, arc on right side toward center court)
  lctx.beginPath();
  lctx.arc(...ft(-41.75, 0), 23.75*S, -arcHalf, arcHalf);
  lctx.stroke();
  // Left corner 3s
  lctx.beginPath(); lctx.moveTo(...ft(-47, -22)); lctx.lineTo(...ft(-47 + cornerLen, -22)); lctx.stroke();
  lctx.beginPath(); lctx.moveTo(...ft(-47,  22)); lctx.lineTo(...ft(-47 + cornerLen,  22)); lctx.stroke();

  // Right 3pt arc (basket at 41.75, arc on left side toward center court)
  lctx.beginPath();
  lctx.arc(...ft(41.75, 0), 23.75*S, Math.PI - arcHalf, Math.PI + arcHalf);
  lctx.stroke();
  // Right corner 3s
  lctx.beginPath(); lctx.moveTo(...ft(47, -22)); lctx.lineTo(...ft(47 - cornerLen, -22)); lctx.stroke();
  lctx.beginPath(); lctx.moveTo(...ft(47,  22)); lctx.lineTo(...ft(47 - cornerLen,  22)); lctx.stroke();

  // Restricted area arcs (4ft)
  lctx.strokeStyle = 'rgba(255,255,255,0.5)';
  lctx.lineWidth = 1.5;
  lctx.beginPath();
  lctx.arc(...ft(-41.75, 0), 4*S, -Math.PI*0.5, Math.PI*0.5); lctx.stroke();
  lctx.beginPath();
  lctx.arc(...ft(41.75, 0), 4*S, Math.PI*0.5, Math.PI*1.5); lctx.stroke();

  // ── Center court logo: "GAME PULSE" + "LIVE" ──────────────────────
  lctx.save();
  lctx.textAlign = 'center';
  lctx.textBaseline = 'middle';

  // Line 1: "GAME" (white) + " PULSE" (italic red) — measure & center together
  const fontSize = 52;
  lctx.font = `900 ${fontSize}px Arial, sans-serif`;
  const gameW = lctx.measureText('GAME ').width;
  lctx.font = `italic 900 ${fontSize}px Arial, sans-serif`;
  const pulseW = lctx.measureText('PULSE').width;
  const totalW = gameW + pulseW;
  const line1X = cx - totalW / 2;
  const line1Y = cy - 14;

  // "GAME" — white bold
  lctx.font = `900 ${fontSize}px Arial, sans-serif`;
  lctx.fillStyle = 'rgba(255,255,255,0.82)';
  lctx.textAlign = 'left';
  lctx.fillText('GAME ', line1X, line1Y);

  // "PULSE" — italic red bold
  lctx.font = `italic 900 ${fontSize}px Arial, sans-serif`;
  lctx.fillStyle = 'rgba(220,30,30,0.88)';
  lctx.fillText('PULSE', line1X + gameW, line1Y);

  // Line 2: "LIVE" — white bold, smaller
  lctx.font = `900 ${Math.round(fontSize * 0.52)}px Arial, sans-serif`;
  lctx.fillStyle = 'rgba(255,255,255,0.6)';
  lctx.textAlign = 'center';
  lctx.fillText('LIVE', cx, cy + 36);

  lctx.restore();

  const lineTex = new THREE.CanvasTexture(lc);
  return lineTex;
}

// Carbon fiber normal map (woven pattern for industrial precision)
function makeCarbonFiberNormal() {
  const s = 256, c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#8080ff';
  ctx.fillRect(0, 0, s, s);
  const cell = 6;
  for (let y = 0; y < s; y += cell) {
    for (let x = 0; x < s; x += cell) {
      ctx.fillStyle = ((x / cell | 0) + (y / cell | 0)) % 2 ? '#7a7af2' : '#8686ff';
      ctx.fillRect(x, y, cell, cell);
    }
  }
  ctx.strokeStyle = '#7070e8'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= s; i += cell) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(s, i); ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(3, 12);
  return tex;
}

// LED matrix dot array (backboard back face)
function makeLEDTexture() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#010102'; ctx.fillRect(0, 0, 256, 128);
  const gap = 7;
  for (let y = gap / 2; y < 128; y += gap) {
    for (let x = gap / 2; x < 256; x += gap) {
      ctx.fillStyle = `rgba(255,17,0,${0.08 + Math.random() * 0.22})`;
      ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }
  return new THREE.CanvasTexture(c);
}

  const vlCone2 = new THREE.Mesh(vlCone2Geo, new THREE.MeshBasicMaterial({
    color: 0xff1100, transparent: true, opacity: 0.015,

  rimLight.position.set(bx, RIM_H - 0.2, 0);

  const connLen = Math.abs(bx - bb.position.x) + 0.3;
  const conn = new THREE.Mesh(
    new THREE.CylinderGeometry(0.035, 0.035, connLen, 6), pianoMat
  );
  conn.position.set((bx + bb.position.x) / 2, RIM_H, 0);
  conn.rotation.z = Math.PI / 2;
  group.add(conn);

  // ── Net — Dynamic Vertex Mesh (animatable) ────────────────────────
  const NET_SEGS = 16, NET_RINGS = 6, NET_H = 1.3;
  const netPositions = [], netIndices = [];

  for (let ring = 0; ring <= NET_RINGS; ring++) {
    const t = ring / NET_RINGS;
    const y = RIM_H - t * NET_H;
    const r = RIM_R * (1 - t * 0.55);
    for (let seg = 0; seg < NET_SEGS; seg++) {
      const a = (seg / NET_SEGS) * Math.PI * 2;
      netPositions.push(bx + Math.cos(a) * r, y, Math.sin(a) * r);
    }
  }
  for (let ring = 0; ring < NET_RINGS; ring++) {
    for (let seg = 0; seg < NET_SEGS; seg++) {
      const cur = ring * NET_SEGS + seg;
      const next = ring * NET_SEGS + (seg + 1) % NET_SEGS;
      const below = (ring + 1) * NET_SEGS + seg;
      const belowNext = (ring + 1) * NET_SEGS + (seg + 1) % NET_SEGS;
      netIndices.push(cur, below, next, next, below, belowNext);
    }
  }

  const netGeo = new THREE.BufferGeometry();
  const netPosArr = new Float32Array(netPositions);
  netGeo.setAttribute('position', new THREE.BufferAttribute(netPosArr, 3));
  netGeo.setIndex(netIndices);
  netGeo.computeVertexNormals();

  const netMesh = new THREE.Mesh(netGeo, new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.18, wireframe: true, side: THREE.DoubleSide,
  }));
  group.add(netMesh);

  const netOriginal = new Float32Array(netPosArr);

  basketAnims.push({
    rimMat, edgeMat, bbEdgeMat, grooveMat, rimLight, baseLight,
    netGeo, netOriginal, netVerts: netPosArr,
    NET_SEGS, NET_RINGS, bx, group, side,
    shakeAmp: 0, netImpulse: 0,
  });

  return group;
}

// ── Basket animation: breathing, net physics, score flash ─────────────
function updateBaskets(time) {
  basketAnims.forEach(b => {
    // Rim breathing glow (slow pulse)
    const breath = 0.3 + Math.sin(time * 2.0) * 0.15;
    b.rimMat.emissiveIntensity = breath;
    b.rimLight.intensity = 0.8 + Math.sin(time * 2.0) * 0.4;

    // Edge wireframe red pulse
    b.edgeMat.opacity = 0.25 + Math.sin(time * 1.5 + 1.0) * 0.15;

    // Base light breathing
    b.baseLight.intensity = 2.0 + Math.sin(time * 1.2) * 1.0;

    // Groove emissive pulse (slow breathing)
    if (b.grooveMat) {
      b.grooveMat.emissiveIntensity = 1.2 + Math.sin(time * 1.0 + 0.5) * 0.35;
    }

    // Net vertex animation (sine wave sway + impulse decay)
    const verts = b.netVerts;
    const orig = b.netOriginal;
    b.netImpulse *= 0.96;  // decay impulse
    for (let ring = 1; ring <= b.NET_RINGS; ring++) {
      const depth = ring / b.NET_RINGS;
      for (let seg = 0; seg < b.NET_SEGS; seg++) {
        const idx = (ring * b.NET_SEGS + seg) * 3;
        // Ambient sway
        const sway = Math.sin(time * 1.8 + seg * 0.8 + ring * 0.5) * 0.015 * depth;
        // Score impulse: downward + outward push
        const impulseY = -b.netImpulse * depth * depth * 0.4;
        const impulseR = b.netImpulse * depth * 0.15 * Math.sin(time * 12 + seg);
        const angle = (seg / b.NET_SEGS) * Math.PI * 2;
        verts[idx]     = orig[idx] + sway + Math.cos(angle) * impulseR;
        verts[idx + 1] = orig[idx + 1] + impulseY;
        verts[idx + 2] = orig[idx + 2] + sway * 0.7 + Math.sin(angle) * impulseR;
      }
    }
    b.netGeo.attributes.position.needsUpdate = true;

    // Shake decay
    if (b.shakeAmp > 0.001) {
      b.shakeAmp *= 0.92;
      b.group.position.x = Math.sin(time * 40) * b.shakeAmp;
      b.group.position.z = Math.cos(time * 55) * b.shakeAmp * 0.5;
    } else {
      b.group.position.x = 0;
      b.group.position.z = 0;
    }
  });
}

// Trigger score reaction on a specific basket
function triggerBasketScore(side) {
  const b = basketAnims.find(x => x.side === side);
  if (!b) return;

  // Gold burst on rim
  b.rimMat.emissive.set(0xffaa00);
  b.rimMat.emissiveIntensity = 5.0;
  b.rimLight.color.set(0xffaa00);
  b.rimLight.intensity = 8;

  // Backboard edge flash
  b.bbEdgeMat.color.set(0xffcc44);
  b.bbEdgeMat.opacity = 1.0;

  // Edge wireframe flash
  b.edgeMat.color.set(0xffaa22);
  b.edgeMat.opacity = 0.9;

  // Groove flash
  if (b.grooveMat) {
    b.grooveMat.emissive.set(0xffaa00);
    b.grooveMat.emissiveIntensity = 5.0;
  }

  // Net impulse
  b.netImpulse = 1.0;

  // Stand micro-shake
  b.shakeAmp = 0.12;

  // Decay back to normal
  const t0 = performance.now();
  function decay(now) {
    const t = (now - t0) / 1500;
    if (t >= 1) {
      b.rimMat.emissive.set(0xff4400);
      b.rimMat.emissiveIntensity = 0.4;
      b.rimLight.color.set(0xff4400);
      b.bbEdgeMat.color.set(0xff2222);
      b.bbEdgeMat.opacity = 0.5;
      b.edgeMat.color.set(0xff2222);
      if (b.grooveMat) { b.grooveMat.emissive.set(0xff1a00); b.grooveMat.emissiveIntensity = 1.5; }
      return;
    }
    const ease = 1 - t * t;
    b.rimMat.emissiveIntensity = 0.4 + 4.6 * ease;
    b.rimLight.intensity = 1.5 + 6.5 * ease;
    b.bbEdgeMat.opacity = 0.5 + 0.5 * ease;
    b.edgeMat.opacity = 0.3 + 0.6 * ease;
    if (b.grooveMat) b.grooveMat.emissiveIntensity = 1.5 + 3.5 * ease;
    requestAnimationFrame(decay);
  }
  requestAnimationFrame(decay);
}

// ── 1. Tiered stadium geometry (matte-black stands) ──────────────────
function buildStadiumShell() {
  const standMat = new THREE.MeshPhysicalMaterial({
    color: 0x06060e, roughness: 0.15, metalness: 0.3,
    clearcoat: 0.2, clearcoatRoughness: 0.6,
  });
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x1a1a2e, transparent: true, opacity: 0.25 });

  function addTier(cx, cz, w, d, rows, rowH, rowD, rotY) {
    const group = new THREE.Group();
    for (let r = 0; r < rows; r++) {
      const geo = new THREE.BoxGeometry(w, rowH, d);
      const mesh = new THREE.Mesh(geo, standMat);
      mesh.position.set(0, r * rowH + rowH / 2, -r * rowD);
      mesh.receiveShadow = true;
      group.add(mesh);
      // Wireframe edge for crystalline look
      const edge = new THREE.LineSegments(new THREE.EdgesGeometry(geo, 20), edgeMat);
      edge.position.copy(mesh.position);
      group.add(edge);
    }
    group.position.set(cx, 0, cz);
    group.rotation.y = rotY;
    scene.add(group);
  }

  // Far sideline (behind court, -Z) — largest section
  addTier(0, -(COURT_HALF_W + 6), COURT_HALF_L * 2 + 24, 3.5, 7, 3.5, 3.2, 0);
  // Camera side (+Z) — shorter, partially behind camera
  addTier(0, COURT_HALF_W + 5, COURT_HALF_L * 2 + 16, 2.5, 4, 3, 2.5, Math.PI);
  // Left end (-X)
  addTier(-(COURT_HALF_L + 6), 0, COURT_HALF_W * 2 + 16, 3, 6, 3.5, 3.0, Math.PI / 2);
  // Right end (+X)
  addTier(COURT_HALF_L + 6, 0, COURT_HALF_W * 2 + 16, 3, 6, 3.5, 3.0, -Math.PI / 2);

  // Volumetric backlights behind far stands
  const backColors = [0x1122aa, 0x0a0a33, 0x221144];
  for (let i = 0; i < 3; i++) {
    const spot = new THREE.SpotLight(backColors[i], 30, 80, Math.PI / 5, 0.7, 1.5);
    spot.position.set((i - 1) * 35, 32, -(COURT_HALF_W + 28));
    spot.target.position.set((i - 1) * 15, 0, 0);
    scene.add(spot); scene.add(spot.target);
  }
  // Rim lights behind end stands
  for (const sx of [-1, 1]) {
    const spot = new THREE.SpotLight(0x110022, 15, 60, Math.PI / 5, 0.8, 1.5);
    spot.position.set(sx * (COURT_HALF_L + 22), 28, 0);
    spot.target.position.set(0, 0, 0);
    scene.add(spot); scene.add(spot.target);
  }
}

      ledSpeed += (target - ledSpeed) * 0.06;

// ── 2. Particle Point Cloud Crowd ────────────────────────────────────
// Shader uniforms shared across crowd updates
const crowdUniforms = {
  uTime:           { value: 0 },
  uScoreOriginX:   { value: 0 },       // X of scoring basket
  uScoreIntensity: { value: 0 },       // 0 = idle, 1 = peak flash
  uScoreColor:     { value: new THREE.Color(1, 1, 1) },
  uHomeColor:      { value: new THREE.Color(0.78, 0.06, 0.18) },  // default red
  uAwayColor:      { value: new THREE.Color(0.11, 0.26, 0.54) },  // default blue
  uMomentum:       { value: 0.0 },     // 0..1 energy level
};

const CROWD_VERT = `
  uniform float uTime;
  uniform float uScoreOriginX;
  uniform float uScoreIntensity;
  uniform float uMomentum;
  attribute float aRandom;
  attribute float aSide;      // -1 = left/away, 0 = neutral, 1 = right/home
  varying float  vRandom;
  varying float  vSide;
  varying float  vDist;       // distance from score origin
  varying float  vHeight;
  void main() {
    vRandom = aRandom;
    vSide   = aSide;
    vHeight = position.y;

    // Spherical pendulum physics: damped oscillation + momentum amplification
    float phase = aRandom * 6.2831;
    float freq  = 0.6 + aRandom * 0.8;
    float amp   = 0.08 + uMomentum * 0.35;
    // Pendulum swing angles
    float swingA = sin(uTime * freq * 0.7 + phase) * amp;
    float swingB = cos(uTime * freq * 0.5 + phase * 2.3) * amp * 0.6;
    // Stand-up / sit-down effect (abs → always positive Y)
    float breathY = abs(sin(uTime * freq + phase)) * amp * 0.8
                  + swingA * swingA * 0.25;
    // Lateral sway: pendulum sin + slow crowd-wave drift
    float wandX = sin(swingA) * (0.12 + uMomentum * 0.35)
                + sin(uTime * 0.15 + phase * 3.7) * 0.025;
    float wandZ = sin(swingB) * (0.08 + uMomentum * 0.25)
                + cos(uTime * 0.12 + phase * 2.1) * 0.025;

    // Score reaction: jump proportional to proximity
    vDist = abs(position.x - uScoreOriginX);
    float waveFront = smoothstep(60.0, 0.0, vDist);
    float scoreJump = uScoreIntensity * waveFront * (0.5 + aRandom * 1.0);

    vec3 pos = position;
    pos.y += breathY + scoreJump;
    pos.x += wandX;
    pos.z += wandZ;

    vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
    gl_Position = projectionMatrix * mvPos;

    // Size: closer = bigger, also pulse on score
    float basePx = 2.0 + aRandom * 1.5;
    float scorePx = uScoreIntensity * waveFront * 3.0;
    gl_PointSize = (basePx + scorePx) * (180.0 / -mvPos.z);
  }
`;

const CROWD_FRAG = `
  uniform float uTime;
  uniform float uScoreIntensity;
  uniform vec3  uScoreColor;
  uniform vec3  uHomeColor;
  uniform vec3  uAwayColor;
  uniform float uMomentum;
  varying float vRandom;
  varying float vSide;
  varying float vDist;
  varying float vHeight;
  void main() {
    // Soft circle falloff
    float d = length(gl_PointCoord - 0.5);
    if (d > 0.5) discard;
    float alpha = smoothstep(0.5, 0.15, d);

    // Base color: deep charcoal with subtle team tint
    vec3 baseCol = vec3(0.08, 0.08, 0.12);
    // Team breathing tint (very subtle)
    float teamBreath = 0.05 + 0.03 * sin(uTime * 0.8 + vRandom * 6.28);
    if (vSide > 0.5) {
      baseCol += uHomeColor * teamBreath;
    } else if (vSide < -0.5) {
      baseCol += uAwayColor * teamBreath;
    }

    // Score glow sweep: distance-based flash
    float waveFront = smoothstep(60.0, 0.0, vDist);
    float scoreFx = uScoreIntensity * waveFront;
    vec3 col = mix(baseCol, uScoreColor, scoreFx * 0.85);
    // Boost brightness during score
    col += scoreFx * 0.4;

    // Momentum glow: higher energy → brighter, warmer
    col += vec3(0.04, 0.02, 0.0) * uMomentum;

    // Camera flash: rare random sparkle
    float spark = step(0.9985, fract(sin(vRandom * 43758.5453 + uTime * 2.7) * 13.37));
    col += vec3(0.8, 0.85, 1.0) * spark;

    // Height-based fade (upper rows dimmer)
    float hFade = 1.0 - smoothstep(5.0, 28.0, vHeight) * 0.5;
    alpha *= hFade * (0.45 + uMomentum * 0.25);

    gl_FragColor = vec4(col, alpha);
  }
`;

function buildParticleCrowd() {
  const COUNT = 5500;
  const positions = new Float32Array(COUNT * 3);
  const randoms   = new Float32Array(COUNT);
  const sides     = new Float32Array(COUNT);

  let idx = 0;
  function emit(n, xMin, xMax, yMin, yMax, zMin, zMax, side) {
    for (let i = 0; i < n && idx < COUNT; i++, idx++) {
      const x = xMin + Math.random() * (xMax - xMin);
      const y = yMin + Math.random() * (yMax - yMin);
      const z = zMin + Math.random() * (zMax - zMin);
      // Tier: y increases with distance from court (simulates stands)
      positions[idx * 3]     = x;
      positions[idx * 3 + 1] = y;
      positions[idx * 3 + 2] = z;
      randoms[idx] = Math.random();
      sides[idx]   = side;
    }
  }

  // Far sideline (-Z): biggest section, 7 tiers
  for (let r = 0; r < 7; r++) {
    const zBase = -(COURT_HALF_W + 7 + r * 3.2);
    const yBase = r * 3.5 + 1.5;
    const xSpan = COURT_HALF_L + 10;
    // Left half = away (side -1), right half = home (side 1)
    emit(180, -xSpan, 0, yBase, yBase + 3, zBase - 1.5, zBase + 1.5, -1);
    emit(180, 0, xSpan, yBase, yBase + 3, zBase - 1.5, zBase + 1.5, 1);
  }

  // Camera side (+Z): 4 tiers, sparser
  for (let r = 0; r < 4; r++) {
    const zBase = COURT_HALF_W + 6 + r * 2.5;
    const yBase = r * 3 + 1;
    const xSpan = COURT_HALF_L + 6;
    emit(90, -xSpan, 0, yBase, yBase + 2.5, zBase - 1, zBase + 1, -1);
    emit(90, 0, xSpan, yBase, yBase + 2.5, zBase - 1, zBase + 1, 1);
  }

  // Left end (-X): away fans
  for (let r = 0; r < 6; r++) {
    const xBase = -(COURT_HALF_L + 7 + r * 3);
    const yBase = r * 3.5 + 1.5;
    const zSpan = COURT_HALF_W + 6;
    emit(120, xBase - 1.5, xBase + 1.5, yBase, yBase + 3, -zSpan, zSpan, -1);
  }

  // Right end (+X): home fans
  for (let r = 0; r < 6; r++) {
    const xBase = COURT_HALF_L + 7 + r * 3;
    const yBase = r * 3.5 + 1.5;
    const zSpan = COURT_HALF_W + 6;
    emit(120, xBase - 1.5, xBase + 1.5, yBase, yBase + 3, -zSpan, zSpan, 1);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aRandom',  new THREE.BufferAttribute(randoms, 1));
  geo.setAttribute('aSide',    new THREE.BufferAttribute(sides, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: crowdUniforms,
    vertexShader: CROWD_VERT,
    fragmentShader: CROWD_FRAG,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);
  return points;
}

const crowdPoints = buildParticleCrowd();

// ── 3. Crowd reaction API ────────────────────────────────────────────
let crowdScoreDecayId = null;

function triggerCrowdReaction(side, color) {
  // side: 'left' or 'right' — which basket scored
  crowdUniforms.uScoreOriginX.value = side === 'right' ? RIM_X : -RIM_X;
  crowdUniforms.uScoreColor.value.set(color || 0xffffff);
  crowdUniforms.uScoreIntensity.value = 1.0;
  // Boost momentum
  crowdUniforms.uMomentum.value = Math.min(1.0, crowdUniforms.uMomentum.value + 0.25);

  if (crowdScoreDecayId) cancelAnimationFrame(crowdScoreDecayId);
  const t0 = performance.now();
  function decay(now) {
    const elapsed = (now - t0) / 2500;  // 2.5s full decay
    if (elapsed >= 1) {
      crowdUniforms.uScoreIntensity.value = 0;
      return;
    }
    crowdUniforms.uScoreIntensity.value = 1.0 - elapsed * elapsed;
    crowdScoreDecayId = requestAnimationFrame(decay);
  }
  crowdScoreDecayId = requestAnimationFrame(decay);
}

function updateCrowd(dt) {
  crowdTime += dt;

  crowdUniforms.uMomentum.value *= (1.0 - dt * 0.15);
}

// Basketball texture
function makeBallTexture() {
  const bc = document.createElement('canvas');
  bc.width = bc.height = 256;
  const bctx = bc.getContext('2d');
  const grad = bctx.createRadialGradient(80, 80, 5, 128, 128, 128);
  grad.addColorStop(0, '#ff9040');
  grad.addColorStop(0.5, '#e05010');
  grad.addColorStop(1, '#7a2800');
  bctx.fillStyle = grad;
  bctx.fillRect(0, 0, 256, 256);
  // Seam lines
  bctx.strokeStyle = 'rgba(40,8,0,0.7)';
  bctx.lineWidth = 5;
  bctx.beginPath(); bctx.arc(128, 128, 110, 0, Math.PI * 2); bctx.stroke();
  bctx.beginPath(); bctx.moveTo(0, 128); bctx.lineTo(256, 128); bctx.stroke();
  bctx.beginPath();
  bctx.moveTo(40, 30); bctx.quadraticCurveTo(128, 100, 216, 30); bctx.stroke();
  bctx.beginPath();
  bctx.moveTo(40, 226); bctx.quadraticCurveTo(128, 156, 216, 226); bctx.stroke();
  return new THREE.CanvasTexture(bc);
}

// ── Data Stream Particle Trail (glowing particles along ball path) ────
const TRAIL_P_COUNT = 60;
const trailPPos = new Float32Array(TRAIL_P_COUNT * 3);
const trailPAge = new Float32Array(TRAIL_P_COUNT);
const trailPGeo = new THREE.BufferGeometry();
trailPGeo.setAttribute('position', new THREE.BufferAttribute(trailPPos, 3));
trailPGeo.setAttribute('aAge', new THREE.BufferAttribute(trailPAge, 1));
trailPGeo.setDrawRange(0, 0);

const TRAIL_P_VERT = `
  attribute float aAge;
  varying float vAge;
  void main() {
    vAge = aAge;
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    gl_Position = projectionMatrix * mvPos;
    gl_PointSize = (2.5 + aAge * 3.0) * (150.0 / -mvPos.z);
  }
`;
const TRAIL_P_FRAG = `
  varying float vAge;
  void main() {
    float d = length(gl_PointCoord - 0.5);
    if (d > 0.5) discard;
    float glow = smoothstep(0.5, 0.05, d);
    vec3 col = mix(vec3(0.15, 0.35, 0.9), vec3(0.7, 0.85, 1.0), vAge * 0.6);
    float alpha = glow * vAge * 0.7;
    gl_FragColor = vec4(col, alpha);
  }
`;
const trailPMat = new THREE.ShaderMaterial({
  vertexShader: TRAIL_P_VERT, fragmentShader: TRAIL_P_FRAG,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
const trailPPoints = new THREE.Points(trailPGeo, trailPMat);
scene.add(trailPPoints);

let trailPIdx = 0;
function pushTrailParticle(x, y, z) {
  const i = trailPIdx % TRAIL_P_COUNT;
  trailPPos[i * 3] = x + (Math.random() - 0.5) * 0.15;
  trailPPos[i * 3 + 1] = y + (Math.random() - 0.5) * 0.15;
  trailPPos[i * 3 + 2] = z + (Math.random() - 0.5) * 0.15;
  trailPAge[i] = 1.0;
  trailPIdx++;
  trailPGeo.setDrawRange(0, Math.min(trailPIdx, TRAIL_P_COUNT));
  trailPGeo.attributes.position.needsUpdate = true;
  trailPGeo.attributes.aAge.needsUpdate = true;
}
function updateTrailParticles(dt) {
  let active = false;
  for (let i = 0; i < TRAIL_P_COUNT; i++) {
    if (trailPAge[i] > 0) {
      trailPAge[i] = Math.max(0, trailPAge[i] - dt * 1.8);
      active = true;
    }
  }
  if (active) trailPGeo.attributes.aAge.needsUpdate = true;
}
function resetTrailParticles() {
  trailPAge.fill(0); trailPIdx = 0; trailPGeo.setDrawRange(0, 0);
}

// ══════════════════════════════════════════════════════════════════════
// ── COURT SCAN: Data Scan Point Cloud on Court Floor ─────────────────
// ══════════════════════════════════════════════════════════════════════

// Uniforms shared with the court scan shader
const scanUniforms = {
  uTime:           { value: 0 },
  uScanDir:        { value: 1.0 },       // +1 = right (home attack), -1 = left
  uScanActive:     { value: 0.0 },       // 0 = idle, 1 = active possession
  uScanColor:      { value: new THREE.Color(0.8, 0.1, 0.1) }, // team color
  uMomentum:       { value: 0.0 },       // shared momentum (0..1)
  uScoreOriginX:   { value: 0.0 },       // glow sweep origin
  uScoreIntensity: { value: 0.0 },       // glow sweep strength
  uPressureX:      { value: 0.0 },       // ball X for pressure zone mapping
  uPressureZ:      { value: 0.0 },       // ball Z
};

const SCAN_VERT = `
  uniform float uTime;
  uniform float uMomentum;
  attribute float aRandom;
  varying float  vRandom;
  varying vec2   vCourtPos;   // normalized court position
  void main() {
    vRandom = aRandom;
    // Court-normalized: x in [-1,1], z in [-1,1]
    vCourtPos = vec2(position.x / 47.0, position.z / 25.0);

    // Subtle vertical breathing (very low amplitude — these are floor dots)
    float phase = aRandom * 6.2831;
    float freq  = 0.4 + aRandom * 0.6;
    float amp   = 0.003 + uMomentum * 0.012;
    float breathY = sin(uTime * freq + phase) * amp;
    float wandX   = sin(uTime * 0.2 + phase * 1.7) * 0.02;
    float wandZ   = cos(uTime * 0.18 + phase * 0.9) * 0.02;

    vec3 pos = position;
    pos.y += breathY;
    pos.x += wandX;
    pos.z += wandZ;

    vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
    gl_Position = projectionMatrix * mvPos;
    gl_PointSize = (1.2 + aRandom * 0.8 + uMomentum * 1.0) * (120.0 / -mvPos.z);
  }
`;

const SCAN_FRAG = `
  uniform float uTime;
  uniform float uScanDir;
  uniform float uScanActive;
  uniform vec3  uScanColor;
  uniform float uMomentum;
  uniform float uScoreOriginX;
  uniform float uScoreIntensity;
  uniform float uPressureX;
  uniform float uPressureZ;
  varying float vRandom;
  varying vec2  vCourtPos;
  void main() {
    // Soft circle
    float d = length(gl_PointCoord - 0.5);
    if (d > 0.5) discard;
    float glow = smoothstep(0.5, 0.1, d);

    // Base: deep charcoal, nearly invisible
    vec3 baseCol = vec3(0.04, 0.04, 0.06);
    float baseAlpha = 0.08;

    // ── Data Scan Wave: sweeps in attack direction ──
    // Wave front: periodic moving line in X
    float waveSpeed = 2.5 + uMomentum * 2.0;
    float waveX = fract(uTime * 0.08 * waveSpeed) * 2.0 - 1.0; // -1 → +1 range
    waveX *= uScanDir; // direction
    float waveDist = abs(vCourtPos.x - waveX);
    float waveFx = smoothstep(0.25, 0.0, waveDist) * uScanActive;

    // Scan color: cold red fading to gold at high momentum
    vec3 scanCol = mix(uScanColor, vec3(1.0, 0.75, 0.15), uMomentum * 0.4);
    baseCol = mix(baseCol, scanCol, waveFx * 0.7);
    baseAlpha += waveFx * 0.35;

    // ── Pressure Zone: intensify near ball / paint area ──
    float pressX = uPressureX / 47.0;
    float pressZ = uPressureZ / 25.0;
    float pressDist = length(vCourtPos - vec2(pressX, pressZ));
    float pressFx = smoothstep(0.5, 0.0, pressDist) * uScanActive;
    baseCol += scanCol * pressFx * 0.25;
    baseAlpha += pressFx * 0.15;

    // Frontcourt intensification: 3pt line + paint region glow
    float attackHalf = step(0.0, vCourtPos.x * uScanDir); // 1 if in attack half
    float paintDist = abs(vCourtPos.x * uScanDir);   // 0 = center, 1 = baseline
    float paintFx = smoothstep(0.4, 0.9, paintDist) * attackHalf * uScanActive;
    float paintFlicker = 0.7 + 0.3 * sin(uTime * 4.0 + vRandom * 6.28);
    baseCol += scanCol * paintFx * 0.15 * paintFlicker;
    baseAlpha += paintFx * 0.1 * paintFlicker;

    // ── Score Glow Sweep ──
    float scoreDist = abs(vCourtPos.x - uScoreOriginX / 47.0);
    float scoreFx = smoothstep(1.5, 0.0, scoreDist) * uScoreIntensity;
    baseCol += vec3(1.0, 0.8, 0.2) * scoreFx * 0.5;
    baseAlpha += scoreFx * 0.4;

    // ── Momentum ambient: all dots subtly glow ──
    baseCol += scanCol * uMomentum * 0.05;
    baseAlpha += uMomentum * 0.04;

    // Camera flash sparkle (rare)
    float spark = step(0.9992, fract(sin(vRandom * 43758.5 + uTime * 1.7) * 13.37));
    baseCol += vec3(0.6, 0.1, 0.1) * spark * uScanActive;

    gl_FragColor = vec4(baseCol, glow * baseAlpha);
  }
`;

// ── Generate court-floor point cloud ─────────────────────────────────
function buildCourtScanCloud() {
  const COUNT = 4500;
  const positions = new Float32Array(COUNT * 3);
  const randoms   = new Float32Array(COUNT);

  for (let i = 0; i < COUNT; i++) {
    // Distribute across full court with slight clustering toward paint areas
    let x, z;
    if (Math.random() < 0.25) {
      // Clustered in paint regions
      const side = Math.random() < 0.5 ? -1 : 1;
      x = side * (47 - Math.random() * 22);
      z = (Math.random() - 0.5) * 18;
    } else {
      // Uniform distribution
      x = (Math.random() - 0.5) * 94;
      z = (Math.random() - 0.5) * 50;
    }
    positions[i * 3]     = x;
    positions[i * 3 + 1] = 0.015;  // just above floor
    positions[i * 3 + 2] = z;
    randoms[i] = Math.random();
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aRandom',  new THREE.BufferAttribute(randoms, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: scanUniforms,
    vertexShader: SCAN_VERT,
    fragmentShader: SCAN_FRAG,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);
  return points;
}

// court scan cloud removed (ground particle effect)

// ── Tactical Chevrons: attack direction overlay on court floor ─────────
const chevUniforms = {
  uTime:  { value: 0.0 },
  uColor: { value: new THREE.Color(0xff0000) },  // locked red
  uDir:   { value: 1.0 },
};
{
  const chevMat = new THREE.ShaderMaterial({
    uniforms: chevUniforms,
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3  uColor;
      uniform float uDir;
      varying vec2  vUv;
      void main() {
        float x = vUv.x, y = vUv.y - 0.5;
        float along = uDir > 0.0 ? (x - 0.5) * 2.0 : (0.5 - x) * 2.0;
        float halfMask = smoothstep(0.0, 0.06, along);
        float phase = fract(along * 3.0 + abs(y) * 2.5 - uTime * 0.22);
        float stripe = 1.0 - smoothstep(0.0, 0.30, phase);
        float wFade  = 1.0 - smoothstep(0.32, 0.50, abs(y));
        float dFade  = smoothstep(0.0, 0.10, along) * mix(0.45, 1.0, along * along);
        float eFade  = smoothstep(0.0, 0.04, vUv.x)  * smoothstep(1.0, 0.96, vUv.x)
                     * smoothstep(0.0, 0.04, vUv.y)  * smoothstep(1.0, 0.96, vUv.y);
        float alpha = stripe * wFade * dFade * halfMask * eFade * 0.15;
        gl_FragColor = vec4(uColor, alpha);
      }
    `,
    transparent: true,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending,
  });
  const chevGeo = new THREE.PlaneGeometry(94, 50);
  const chevMesh = new THREE.Mesh(chevGeo, chevMat);
  chevMesh.rotation.x = -Math.PI / 2;
  chevMesh.position.set(0, 0.018, 0);
  scene.add(chevMesh);
}

window._updateChevrons = function(teamId, period) {
  if (!teamId || !homeTeamId) return;
  const side = attackingSide(teamId, period);
  const dir = side === 'right' ? 1.0 : -1.0;
  chevUniforms.uDir.value = dir;
  // Color locked to red — do not read team colors
  _possArrow.setDir(dir);
};

// ── Possession arrow: center-court floor decal ────────────────────────
// Three flowing chevrons (>>>/<<<) on the floor at centre court.
// Redraws only when direction changes; opacity pulses every frame.
const _possArrow = (() => {
  const CW = 512, CH = 128;
  const cv  = document.createElement('canvas');
  cv.width = CW; cv.height = CH;
  const tex = new THREE.CanvasTexture(cv);
  tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());

  let _dir = 1;   // 1 = right, -1 = left

  function draw() {
    const c = cv.getContext('2d');
    c.clearRect(0, 0, CW, CH);
    const mx = CW / 2, my = CH / 2;

    // Three stacked chevrons: brightest at the leading edge
    const spacing = 100;
    for (let i = 0; i < 3; i++) {
      // i=0 trailing, i=2 leading
      const fade   = 0.30 + i * 0.35;        // 0.30 → 0.65 → 1.00
      const ox     = (i - 1) * spacing * _dir; // spread along attack axis
      const hs     = 44 + i * 4;              // slightly taller as you go forward

      c.globalAlpha = fade;
      c.shadowColor = '#ff2200'; c.shadowBlur = 28;
      c.strokeStyle = '#ff2200';
      c.lineWidth   = 16 - i * 2;            // leading chevron thinner = sleeker
      c.lineCap = 'round'; c.lineJoin = 'round';

      c.beginPath();
      if (_dir > 0) {
        c.moveTo(mx + ox - 32, my - hs);
        c.lineTo(mx + ox + 32, my);
        c.lineTo(mx + ox - 32, my + hs);
      } else {
        c.moveTo(mx + ox + 32, my - hs);
        c.lineTo(mx + ox - 32, my);
        c.lineTo(mx + ox + 32, my + hs);
      }
      c.stroke();
    }
    c.globalAlpha = 1;

    // "ATK" label at the leading tip
    const lx = _dir > 0 ? CW * 0.85 : CW * 0.15;
    c.font = 'bold 20px "JetBrains Mono",monospace';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.shadowColor = '#ff0000'; c.shadowBlur = 14;
    c.fillStyle = '#ff4444';
    c.fillText('ATK', lx, my);

    tex.needsUpdate = true;
  }

  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const geo  = new THREE.PlaneGeometry(18, 4.5);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(0, 0.07, 3);  // centre court, just above floor
  scene.add(mesh);

  draw();  // initial draw (direction = right)

  let _t = 0;
  return {
    setDir(dir) {
      if (dir === _dir) return;
      _dir = dir;
      draw();
    },
    update(dt) {
      _t += dt * 2.2;
      mat.opacity = 0.60 + Math.sin(_t) * 0.30;  // 0.30 … 0.90 breathing
    },
  };
})();

function makeChronosSprite(worldX) {

const chronosL = makeChronosSprite(-RIM_X);
const chronosR = makeChronosSprite( RIM_X);

function updateChronos(clockStr, isClutch) {
  for (const { tctx, tc, tex, mat } of [chronosL, chronosR]) {
    tctx.clearRect(0, 0, tc.width, tc.height);
    const col = isClutch ? '#ff3333' : '#224444';
    tctx.font = '700 34px "JetBrains Mono","Courier New",monospace';
    tctx.textBaseline = 'middle'; tctx.textAlign = 'center';
    tctx.shadowColor = col; tctx.shadowBlur = isClutch ? 20 : 8;
    tctx.fillStyle = col;
    tctx.fillText(clockStr, tc.width / 2, tc.height / 2);
    tex.needsUpdate = true;
    mat.opacity = isClutch ? (0.55 + 0.3 * Math.sin(performance.now() * 0.008)) : 0.35;
  }
}

// ── CLUTCH MODE ───────────────────────────────────────────────────────
let clutchActive = false;
function parseClockSec(s) {
  if (!s) return 999;
  const p = s.split(':');
  return p.length === 2 ? +p[0] * 60 + +p[1] : 999;
}
function setClutchMode(on) {
  if (on === clutchActive) return;
  clutchActive = on;
  if (on) {
    bloomPass.strength = 0.75;
    bloomPass.threshold = 0.3;
    ambLight.color.set(0x551111);
    ambLight.intensity = 3.8;
    scene.fog.color.set(0x110000);
    scanUniforms.uScanColor.value.set(0xff1111);
  } else {
    bloomPass.strength = 0.35;
    bloomPass.threshold = 0.45;
    ambLight.color.set(0x445566);
    ambLight.intensity = 4.5;
    scene.fog.color.set(0x000000);
  }
}

  scanUniforms.uTime.value += dt;

  scanUniforms.uMomentum.value = crowdUniforms.uMomentum.value;

}
