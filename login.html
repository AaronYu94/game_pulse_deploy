<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Game Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .auth-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(255,107,43,.35);
      margin-bottom: 0.25rem;
    }
    .auth-logo span { color: var(--text-muted); font-size: 1rem; font-family: 'Noto Sans SC', sans-serif; font-weight: 500; }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.6rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-error {
      background: var(--heat-bg);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: var(--radius-md);
      color: var(--heat);
      font-size: 0.85rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-error.visible { display: block; }

    .auth-success {
      background: var(--success-bg);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: var(--radius-md);
      color: var(--success);
      font-size: 0.85rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-success.visible { display: block; }

    .auth-footer {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <div class="auth-logo">GAME <span>PULSE</span></div>
      <div class="auth-subtitle">Sign in to rate games, place predictions, and earn Score Coins.</div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <!-- Login form -->
      <div class="auth-form active" id="loginForm">
        <div class="auth-error" id="loginError"></div>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="button" id="loginBtn" class="btn btn--primary" style="width:100%;margin-top:.25rem">Login</button>
      </div>

      <!-- Register form -->
      <div class="auth-form" id="registerForm">
        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess"></div>
        <div class="form-group">
          <label class="form-label" for="regUsername">Username</label>
          <input type="text" id="regUsername" class="form-input" placeholder="e.g. BallIsLife" maxlength="30" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email</label>
          <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Password <span style="color:var(--text-muted);font-weight:400">(min. 6 chars)</span></label>
          <input type="password" id="regPassword" class="form-input" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button type="button" id="registerBtn" class="btn btn--primary" style="width:100%;margin-top:.25rem">Create Account</button>
      </div>

      <div class="auth-footer">You start with <strong style="color:var(--accent-2)">200 Score Coins</strong> — predict games & earn more.</div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    // If already logged in, redirect
    if (isLoggedIn()) {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
      window.location.href = redirect;
    }

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
      });
    });

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }
    function hideError(id) {
      document.getElementById(id).classList.remove('visible');
    }

    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
      hideError('loginError');
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showError('loginError', 'Please fill in all fields.'); return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in…';
      try {
        await apiLogin(email, password);
        const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
        window.location.href = redirect;
      } catch (err) {
        showError('loginError', err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Login';
      }
    });

    // Allow Enter key
    ['loginEmail', 'loginPassword'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
      });
    });

    // Register
    document.getElementById('registerBtn').addEventListener('click', async () => {
      hideError('registerError');
      document.getElementById('registerSuccess').classList.remove('visible');
      const username = document.getElementById('regUsername').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!username || !email || !password) { showError('registerError', 'Please fill in all fields.'); return; }

      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        await apiRegister(username, email, password);
        const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
        window.location.href = redirect;
      } catch (err) {
        showError('registerError', err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });

    function escapeHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }
  </script>
</body>
</html>
